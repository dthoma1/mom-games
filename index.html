<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>기술 생존 가이드 · Technology Survival Guides</title>
<style>
  :root{
    --paper:#efe7d4; --paper2:#e7dcc2; --ink:#2b2320; --soft:#7a6f5f;
    --line:#d8ccb0; --accent:#8a5a2b; --good:#2f8f4e;
    --serif:"Iowan Old Style","Palatino Linotype","Palatino","Book Antiqua",Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;}
  body{
    font-family:var(--sans); color:var(--ink);
    background:
      radial-gradient(1200px 600px at 50% -10%, #f7f0df 0%, rgba(247,240,223,0) 60%),
      linear-gradient(180deg,#efe7d4 0%, #e7dcc2 100%);
    background-attachment:fixed;
    min-height:100vh;
  }
  #wrap{max-width:1120px;margin:0 auto;padding:26px 20px 60px;}

  /* ---- top bar ---- */
  #topbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:6px;}
  #langToggle{display:inline-flex;background:#fbf7ec;border:1px solid var(--line);
    border-radius:999px;overflow:hidden;font-size:12px;font-weight:700;box-shadow:0 2px 6px rgba(80,60,20,.10);}
  #langToggle button{border:none;background:transparent;padding:7px 13px;cursor:pointer;color:#a2957f;font-weight:800;}
  #langToggle button.on{background:linear-gradient(90deg,#8a5a2b,#b47f45);color:#fff;}

  /* ---- masthead ---- */
  header.mast{text-align:center;padding:14px 0 26px;}
  .kicker{font-family:var(--serif);letter-spacing:.32em;text-transform:uppercase;
    font-size:12px;color:var(--soft);margin-bottom:12px;}
  h1.title{font-family:var(--serif);font-weight:700;font-size:clamp(30px,5.4vw,52px);
    line-height:1.05;margin:0;letter-spacing:.01em;}
  .lede{font-family:var(--serif);font-style:italic;color:var(--soft);font-size:clamp(15px,2.2vw,20px);
    margin:14px auto 0;max-width:620px;line-height:1.5;}
  .rule{width:64px;height:2px;background:var(--accent);margin:22px auto 0;opacity:.65;}

  /* ---- shelf ---- */
  #shelf{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
    gap:54px 30px;justify-items:center;margin-top:44px;}
  .bookWrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;
    width:100%;max-width:230px;}
  .bookWrap:focus{outline:none;}

  /* the 3D-ish book */
  .book{
    position:relative;width:186px;height:270px;
    transform:perspective(1100px) rotateY(-17deg);
    transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.2,.7,.2,1), box-shadow .5s;
    border-radius:3px 8px 8px 3px;
    background:linear-gradient(120deg,var(--c1),var(--c2));
    box-shadow:
      0 2px 2px rgba(0,0,0,.18),
      0 16px 34px rgba(60,40,15,.30);
    color:#fff;
  }
  .bookWrap:hover .book, .bookWrap:focus-visible .book{
    transform:perspective(1100px) rotateY(-6deg) translateY(-10px);
    box-shadow:0 4px 4px rgba(0,0,0,.18), 0 26px 48px rgba(60,40,15,.38);
  }
  /* spine on the left */
  .book::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:15px;border-radius:3px 0 0 3px;
    background:linear-gradient(to right, rgba(0,0,0,.42), rgba(0,0,0,.12) 55%, rgba(255,255,255,.14) 92%, rgba(0,0,0,.20));
  }
  /* page edges on the right */
  .book::after{
    content:"";position:absolute;right:-3px;top:5px;bottom:5px;width:6px;border-radius:0 2px 2px 0;
    background:repeating-linear-gradient(to bottom,#f3ecda,#f3ecda 1px,#cbbf9f 2px,#f3ecda 3px);
    box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  .book .face{position:absolute;inset:0;padding:22px 20px 20px 26px;display:flex;flex-direction:column;
    border-radius:3px 8px 8px 3px;
    background:
      linear-gradient(115deg, rgba(255,255,255,.18), rgba(255,255,255,0) 42%),
      linear-gradient(0deg, rgba(0,0,0,.16), rgba(0,0,0,0) 30%);
  }
  .book .vol{font-family:var(--serif);letter-spacing:.24em;font-size:10.5px;opacity:.8;text-transform:uppercase;}
  .book .emb{width:26px;height:2px;background:rgba(255,255,255,.55);margin:9px 0 auto;}
  .book .ct{font-family:var(--serif);font-weight:700;font-size:22px;line-height:1.15;
    text-shadow:0 1px 2px rgba(0,0,0,.25);}
  .book .cten{font-family:var(--serif);font-style:italic;font-size:12.5px;opacity:.85;margin-top:7px;line-height:1.3;}
  .book .imprint{font-family:var(--serif);letter-spacing:.14em;font-size:9px;opacity:.72;text-transform:uppercase;
    margin-top:14px;border-top:1px solid rgba(255,255,255,.28);padding-top:8px;}
  .book.soon .face{filter:saturate(.85);}
  .soonTag{position:absolute;top:12px;right:10px;z-index:3;background:rgba(255,255,255,.92);color:#7a4a12;
    font-size:9.5px;font-weight:800;letter-spacing:.08em;padding:4px 8px;border-radius:999px;text-transform:uppercase;
    box-shadow:0 2px 6px rgba(0,0,0,.2);}
  /* ground shadow + shelf tick */
  .bookWrap .ground{width:150px;height:16px;margin-top:14px;border-radius:50%;
    background:radial-gradient(ellipse at center, rgba(60,40,15,.28), rgba(60,40,15,0) 70%);}
  .bookWrap .label{font-family:var(--serif);text-align:center;margin-top:2px;font-size:14px;font-weight:700;color:var(--ink);}
  .bookWrap .sublabel{text-align:center;font-size:11.5px;color:var(--soft);margin-top:2px;line-height:1.35;max-width:200px;}
  .doneChip{display:inline-block;margin-top:6px;font-size:11px;font-weight:800;color:var(--good);
    background:#e7f5ec;border:1px solid #bfe4cb;border-radius:999px;padding:2px 9px;}

  /* ---- detail view ---- */
  #detail{display:none;}
  .backBtn{font-family:var(--serif);background:#fbf7ec;border:1px solid var(--line);border-radius:999px;
    padding:9px 16px;font-size:14px;font-weight:700;color:var(--accent);cursor:pointer;box-shadow:0 2px 6px rgba(80,60,20,.10);}
  .backBtn:hover{background:#fff;}
  .hero{display:flex;gap:36px;align-items:center;margin:22px 0 8px;flex-wrap:wrap;justify-content:center;}
  .hero .book{transform:perspective(1200px) rotateY(-20deg);flex:0 0 auto;}
  .hero .htext{flex:1;min-width:280px;max-width:560px;}
  .hero .hvol{font-family:var(--serif);letter-spacing:.28em;text-transform:uppercase;font-size:12px;color:var(--soft);}
  .hero h2{font-family:var(--serif);font-size:clamp(26px,4vw,40px);margin:8px 0 4px;line-height:1.1;}
  .hero .hsub{font-family:var(--serif);font-style:italic;color:var(--soft);font-size:18px;margin-bottom:14px;}
  .hero .hblurb{font-size:15.5px;line-height:1.7;color:#4a4038;max-width:540px;}
  .progWrap{margin-top:16px;max-width:420px;}
  .progBar{height:9px;background:#ded2b6;border-radius:999px;overflow:hidden;}
  .progFill{height:100%;width:0;background:linear-gradient(90deg,var(--good),#5cc47f);transition:width .5s;}
  .progText{font-size:12.5px;color:var(--soft);margin-top:6px;font-weight:700;}

  .tocWrap{background:#fbf7ec;border:1px solid var(--line);border-radius:16px;
    box-shadow:0 12px 34px rgba(80,60,20,.12);padding:8px 8px 14px;margin-top:26px;}
  .partHead{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--accent);
    letter-spacing:.04em;padding:16px 16px 8px;border-bottom:1px solid var(--line);margin:0 6px;}
  .chapter{display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;
    padding:13px 16px;border-radius:12px;margin:2px 6px;transition:background .15s;}
  a.chapter:hover{background:#f1e8d3;}
  .chNum{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--soft);width:26px;flex:0 0 auto;text-align:center;}
  .chBody{flex:1;min-width:0;}
  .chTitle{font-size:16px;font-weight:700;line-height:1.25;}
  .chSub{font-size:12.5px;color:var(--soft);margin-top:2px;line-height:1.35;}
  .chRight{flex:0 0 auto;font-size:13px;color:var(--soft);}
  .chapter.done .chRight{color:var(--good);font-weight:800;}
  .chapter.locked{opacity:.6;cursor:default;}
  .soonBanner{text-align:center;font-family:var(--serif);font-style:italic;color:var(--soft);
    padding:14px 16px 2px;font-size:15px;}

  footer{text-align:center;margin-top:52px;font-family:var(--serif);font-style:italic;
    color:var(--soft);font-size:13px;}
  footer a{color:var(--accent);}

  @media (max-width:520px){
    #shelf{gap:40px 18px;}
    .hero{gap:22px;}
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <div id="langToggle">
      <button data-l="ko" class="on">한국어</button>
      <button data-l="en">EN</button>
    </div>
  </div>

  <!-- ===== SHELF ===== -->
  <div id="shelfView">
    <header class="mast">
      <div class="kicker" id="kicker"></div>
      <h1 class="title" id="mastTitle"></h1>
      <p class="lede" id="mastLede"></p>
      <div class="rule"></div>
    </header>
    <div id="shelf"></div>
    <footer id="foot"></footer>
  </div>

  <!-- ===== DETAIL ===== -->
  <div id="detail">
    <button class="backBtn" id="backBtn" onclick="showShelf()"></button>
    <div class="hero" id="hero"></div>
    <div class="tocWrap" id="toc"></div>
    <footer id="foot2"></footer>
  </div>
</div>

<script>

const BOOKS=[{"id": "macbook", "vol": "I", "tko": "맥북 생존 가이드", "ten": "MacBook Survival Guide", "subko": "손가락 쓰는 법부터 인터넷 안전까지", "suben": "From your fingertips to staying safe online", "blurbko": "맥북을 처음 켜는 순간부터 함께해요. 트랙패드로 손가락 쓰는 법, 창과 파일 정리, 비밀번호와 인터넷 안전까지 — 하나씩, 천천히.", "blurben": "Everything from the first time you open the lid: using the trackpad with your fingers, arranging windows and files, passwords, and staying safe online — one gentle step at a time.", "c1": "#13294b", "c2": "#2f6bb0", "spine": "#0e1f3a", "parts": [{"tko": "1부 · 맥북에 오신 걸 환영해요", "ten": "Part 1 · Welcome to Your MacBook", "games": [{"key": "taps", "url": "taps-game/", "tko": "여러 가지 탭 배우기", "ten": "Kinds of Taps", "sko": "가볍게 톡·꾹 눌러 딸깍·두 번 톡·끌기 배우기", "sen": "Light tap, press-click, double-tap, and drag"}, {"key": "trackpad", "url": "trackpad-game/", "tko": "트랙패드 연습", "ten": "Trackpad Practice", "sko": "손가락으로 마우스를 움직이고 누르기", "sen": "Move and click with your fingers"}, {"key": "select", "url": "select-game/", "tko": "고르기 연습", "ten": "Selecting Practice", "sko": "선택하고·취소하고·다른 걸로 바꿔 고르기", "sen": "Select, deselect, and switch your choice"}, {"key": "window", "url": "window-game/", "tko": "창 정리 연습", "ten": "Window Practice", "sko": "창 옮기기·크기 바꾸기·드래그", "sen": "Move, resize, and drag windows"}, {"key": "menus", "url": "menus-game/", "tko": "메뉴 배우기", "ten": "Learn Menus", "sko": "숨은 메뉴 열고 닫기·오른쪽 클릭", "sen": "Open hidden menus & right-click"}, {"key": "controls", "url": "controls-game/", "tko": "화면 익히기", "ten": "Learn the Screen", "sko": "버튼·체크박스·스위치·드롭다운", "sen": "Buttons, checkboxes, switches, dropdowns"}, {"key": "dock", "url": "dock-game/", "tko": "독과 앱 관리 배우기", "ten": "The Dock & Managing Apps", "sko": "독·런치패드·앱 열고 완전히 종료하기", "sen": "Dock, Launchpad, opening & fully quitting apps"}, {"key": "install", "url": "install-game/", "tko": "앱 설치 배우기", "ten": "Installing Apps", "sko": "앱 내려받기·DMG 파일·안전하게 지우기", "sen": "Download apps, DMG files, safe removal"}]}, {"tko": "2부 · 글자와 파일 다루기", "ten": "Part 2 · Te let LANG=localStorage.getItem("momLang")||"ko";
const T=(o,k)=>o[(k||"")+ (LANG==="ko"?"ko":"en")];
const DONE=k=>{try{return localStorage.getItem("momHub:done:"+k)==="1";}catch(e){return false;}};

const UI={
  kicker:{ko:"기술 생존 가이드",en:"Technology Survival Guides"},
  title:{ko:"기술 생존 가이드",en:"Technology\u00A0Survival Guides"},
  lede:{ko:"어렵게 느껴지는 기술을, 한 권씩 천천히. 읽고 싶은 책을 골라 보세요.",
        en:"Technology made gentle — one book at a time. Choose a guide to begin."},
  foot:{ko:"엄마를 위해 사랑으로 만들었어요 💛",en:"Made with love, for Mom 💛"},
  back:{ko:"‹ 책장으로 돌아가기",en:"‹ Back to the shelf"},
  soon:{ko:"곧 나와요",en:"Coming soon"},
  soonBanner:{ko:"이 책은 아직 준비 중이에요. 아래는 앞으로 담길 이야기예요 👇",
              en:"This book is still being written. Here's what's coming 👇"},
  lessonsDone:{ko:(d,t)=>`${t}개 중 ${d}개 완료`,en:(d,t)=>`${d} of ${t} done`},
  allDone:{ko:"모두 완료! 🎉",en:"All done! 🎉"},
  start:{ko:"열기 ▶",en:"Open ▶"},
  chapters:{ko:(n)=>`${n}개의 수업`,en:(n)=>`${n} lessons`},
  contents:{ko:"목차",en:"Contents"},
};

function bookGamesCount(b){ return b.soon?0:b.parts.reduce((s,p)=>s+p.games.length,0); }
function bookDoneCount(b){ if(b.soon) return 0;
  return b.parts.reduce((s,p)=>s+p.games.filter(g=>DONE(g.key)).length,0); }

function bookEl(b){
  const w=document.createElement("div");
  w.innerHTML=`<div class="book ${b.soon?'soon':''}" style="--c1:${b.c1};--c2:${b.c2}">
    ${b.soon?`<div class="soonTag">${UI.soon[LANG]}</div>`:''}
    <div class="face">
      <div class="vol">Vol. ${b.vol}</div>
      <div class="emb"></div>
      <div class="ct">${T(b,'t')}</div>
      <div class="cten">${LANG==='ko'?b.ten:''}</div>
      <div class="imprint">${LANG==='ko'?'기술 생존 가이드':'Technology Survival Guide'}</div>
    </div>
  </div>`;
  return w.firstElementChild;
}

function renderShelf(){
  document.getElementById("kicker").textContent=UI.kicker[LANG];
  document.getElementById("mastTitle").textContent=UI.title[LANG];
  document.getElementById("mastLede").textContent=UI.lede[LANG];
  document.getElementById("foot").textContent=UI.foot[LANG];
  const shelf=document.getElementById("shelf"); shelf.innerHTML="";
  BOOKS.forEach(b=>{
    const wrap=document.createElement("div"); wrap.className="bookWrap";
    wrap.tabIndex=0; wrap.setAttribute("role","button");
    wrap.appendChild(bookEl(b));
    const ground=document.createElement("div"); ground.className="ground"; wrap.appendChild(ground);
    const label=document.createElement("div"); label.className="label"; label.textContent=T(b,'t'); wrap.appendChild(label);
    const sub=document.createElement("div"); sub.className="sublabel"; sub.textContent=T(b,'sub'); wrap.appendChild(sub);
    if(!b.soon){
      const tot=bookGamesCount(b), d=bookDoneCount(b);
      const chip=document.createElement("div"); chip.className="doneChip";
      chip.textContent = d>0 ? (d>=tot?UI.allDone[LANG]:UI.lessonsDone[LANG](d,tot)) : UI.chapters[LANG](tot);
      if(d===0) chip.style.cssText="color:var(--soft);background:#f1e8d3;border-color:var(--line);margin-top:6px;display:inline-block;font-size:11px;font-weight:800;border-radius:999px;padding:2px 9px;";
      wrap.appendChild(chip);
    }
    const open=()=>showDetail(b.id);
    wrap.addEventListener("click",open);
    wrap.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); open(); }});
    shelf.appendChild(wrap);
  });
}

function showDetail(id){
  window.__curBook=id;
  const b=BOOKS.find(x=>x.id===id); if(!b) return;
  document.getElementById("shelfView").style.display="none";
  document.getElementById("detail").style.display="block";
  document.getElementById("backBtn").textContent=UI.back[LANG];
  document.getElementById("foot2").textContent=UI.foot[LANG];
  window.scrollTo(0,0);

  const hero=document.getElementById("hero"); hero.innerHTML="";
  hero.appendChild(bookEl(b));
  const tx=document.createElement("div"); tx.className="htext";
  const tot=bookGamesCount(b), d=bookDoneCount(b);
  tx.innerHTML=`<div class="hvol">Vol. ${b.vol}</div>
    <h2>${T(b,'t')}</h2>
    <div class="hsub">${T(b,'sub')}</div>
    <div class="hblurb">${T(b,'blurb')}</div>`;
  if(!b.soon){
    const pct=tot?Math.round(d/tot*100):0;
    tx.innerHTML+=`<div class="progWrap">
      <div class="progBar"><div class="progFill" style="width:${pct}%"></div></div>
      <div class="progText">${d>=tot&&tot>0?UI.allDone[LANG]:UI.lessonsDone[LANG](d,tot)}</div></div>`;
  }
  hero.appendChild(tx);

  const toc=document.getElementById("toc"); toc.innerHTML="";
  if(b.soon){
    const banner=document.createElement("div"); banner.className="soonBanner";
    banner.textContent=UI.soonBanner[LANG]; toc.appendChild(banner);
    const head=document.createElement("div"); head.className="partHead"; head.textContent=UI.contents[LANG];
    toc.appendChild(head);
    b.toc.forEach((ch,i)=>{
      const row=document.createElement("div"); row.className="chapter locked";
      row.innerHTML=`<div class="chNum">${i+1}</div><div class="chBody"><div class="chTitle">${LANG==='ko'?ch[0]:ch[1]}</div></div>`;
      toc.appendChild(row);
    });
  } else {
    let n=0;
    b.parts.forEach(part=>{
      const head=document.createElement("div"); head.className="partHead"; head.textContent=T(part,'t');
      toc.appendChild(head);
      part.games.forEach(g=>{
        n++;
        const a=document.createElement("a"); a.className="chapter"+(DONE(g.key)?" done":"");
        a.href=BASE+g.url; a.target="_blank"; a.rel="noopener";
        a.innerHTML=`<div class="chNum">${n}</div>
          <div class="chBody"><div class="chTitle">${LANG==='ko'?g.tko:g.ten}</div>
          <div class="chSub">${LANG==='ko'?g.sko:g.sen}</div></div>
          <div class="chRight">${DONE(g.key)?"✓":UI.start[LANG]}</div>`;
        toc.appendChild(a);
      });
    });
  }
}

function showShelf(){
  document.getElementById("detail").style.display="none";
  document.getElementById("shelfView").style.display="block";
  renderShelf(); window.scrollTo(0,0);
}

function setLang(l){ LANG=l; localStorage.setItem("momLang",l);
  document.documentElement.lang=l;
  document.querySelectorAll("#langToggle button").forEach(x=>x.classList.toggle("on",x.dataset.l===l));
  if(document.getElementById("detail").style.display==="block" && window.__curBook){
    showDetail(window.__curBook);
  } else renderShelf();
}

document.querySelectorAll("#langToggle button").forEach(b=>b.addEventListener("click",()=>setLang(b.dataset.l)));
document.documentElement.lang=LANG;
document.querySelectorAll("#langToggle button").forEach(x=>x.classList.toggle("on",x.dataset.l===LANG));
renderShelf();
</script>
