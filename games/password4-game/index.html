<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>엄마의 비밀번호 관리자 배우기 (비밀번호 4편)</title>
<style>
  :root{
    --bg1:#eef2ff; --bg2:#fdf2f8; --ink:#1f2937; --soft:#6b7280;
    --accent:#6366f1; --accent2:#ec4899; --good:#22c55e; --warn:#f59e0b; --bad:#ef4444;
  }
  *{box-sizing:border-box; -webkit-user-select:none; user-select:none;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    color:var(--ink);background:linear-gradient(135deg,var(--bg1),var(--bg2));overflow:hidden;
    overscroll-behavior:none;touch-action:none;}
  #app{height:100%;display:flex;flex-direction:column;align-items:center;padding:12px;max-width:1000px;margin:0 auto;}
  header{width:100%;text-align:center;position:relative;}
  #langToggle{position:absolute;top:-2px;right:0;display:inline-flex;background:#fff;border:1px solid #e5e7eb;
    border-radius:999px;overflow:hidden;font-size:12px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.08);z-index:140;}
  #langToggle button{border:none;background:transparent;padding:6px 11px;cursor:pointer;color:#9ca3af;font-weight:700;}
  #langToggle button.on{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;}
  #homeBtn{position:absolute;top:-2px;left:0;display:inline-flex;align-items:center;text-decoration:none;
    background:#fff;border:1px solid #e5e7eb;border-radius:999px;font-size:12px;font-weight:700;color:#6366f1;
    padding:6px 11px;box-shadow:0 2px 6px rgba(0,0,0,.08);z-index:90;cursor:pointer;}
  #homeBtn:hover{background:#f5f5ff;}
  #homeBtn .en{display:none;}
  html[lang="en"] #homeBtn .ko{display:none;}
  html[lang="en"] #homeBtn .en{display:inline;}
  h1{font-size:22px;margin:2px 0;}
  .sub{color:var(--soft);font-size:14px;margin:0 0 8px;}
  #progressWrap{width:100%;height:12px;background:#fce7f3;border-radius:999px;overflow:hidden;margin-bottom:4px;}
  #progressBar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .45s ease;}
  #stepText{font-size:12px;color:var(--soft);margin-bottom:8px;}

  #card{position:relative;width:100%;flex:1;display:flex;flex-direction:column;min-height:0;gap:10px;}
  button.ghostBtn{position:absolute;right:2px;top:-4px;font-size:12px;color:var(--soft);background:#fff;
    border:1px solid #e5e7eb;border-radius:999px;padding:6px 12px;cursor:pointer;z-index:120;}

  /* intro */
  #introView{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#fff;border-radius:18px;box-shadow:0 10px 30px rgba(99,102,241,.12);padding:26px;text-align:center;overflow:auto;}
  #introArt{font-size:70px;line-height:1.15;margin-bottom:10px;}
  #introTitle{font-size:26px;font-weight:800;margin:4px 0;}
  #introText{font-size:17px;line-height:1.7;max-width:700px;color:#374151;}
  #introText b{color:var(--accent);}
  .introBtns{margin-top:20px;display:flex;gap:10px;}

  /* illustrated scenes */
  .scene{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin:2px auto 12px;}
  .scene .fig{font-size:42px;line-height:1;}
  .scene .arw{font-size:26px;color:#c7cad1;}
  .lockPile{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;max-width:360px;margin:2px auto 12px;}
  .lockPile .li{font-size:32px;}
  .lockPile .li .cap{display:block;font-size:11px;color:var(--soft);}

  /* lesson */
  #mainView{flex:1;min-height:0;display:flex;flex-direction:column;gap:10px;}
  #banner{background:#fff;border-radius:16px;box-shadow:0 8px 22px rgba(99,102,241,.12);padding:10px 16px;text-align:center;}
  #banner .t{font-size:18px;font-weight:800;}
  #banner .i{font-size:15px;margin-top:2px;}
  #banner .i b{color:var(--accent);}
  #banner .h{font-size:13px;color:var(--soft);margin-top:3px;}

  #stage{position:relative;flex:1;min-height:0;border-radius:16px;overflow:auto;
    background:#fff;box-shadow:0 14px 34px rgba(99,102,241,.14);
    display:flex;align-items:center;justify-content:center;padding:18px;}
  .panel{width:100%;max-width:640px;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;}
  .kbtn{font-size:17px;font-weight:700;color:#fff;background:linear-gradient(90deg,var(--accent),var(--accent2));
    border:none;border-radius:999px;padding:13px 26px;cursor:pointer;box-shadow:0 6px 16px rgba(99,102,241,.3);}
  .kbtn:active{transform:translateY(1px);} .kbtn:disabled{opacity:.5;cursor:default;}
  .note{font-size:15px;line-height:1.6;color:#374151;background:#eef2ff;border-radius:12px;padding:12px 16px;max-width:580px;}
  .note b{color:var(--accent);}
  .note.good{background:#ecfdf5;} .note.good b{color:var(--good);}
  .note.bad{background:#fef2f2;} .note.bad b{color:var(--bad);}
  .note.warn{background:#fffbeb;} .note.warn b{color:var(--warn);}

  .loginBox{width:290px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:16px;padding:16px;text-align:center;}
  .loginBox .step{font-size:13px;margin:6px 0;}
  .loginBox .step .ok{color:var(--good);font-weight:700;}

  /* face / touch id */
  .fpBtn{width:110px;height:110px;border-radius:50%;border:3px solid #c7d2fe;background:#eef2ff;font-size:52px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background .2s;}
  .fpBtn:active{background:#e0e7ff;}
  .fpBtn.scanning{animation:fpScan 1s ease-out;}
  @keyframes fpScan{0%{box-shadow:0 0 0 0 rgba(99,102,241,.5);}100%{box-shadow:0 0 0 24px rgba(99,102,241,0);}}

  /* password field + strength meter */
  .pwField{font-family:"SF Mono",Menlo,monospace;font-size:18px;text-align:center;width:250px;padding:11px;
    border:2px solid #cbd5e1;border-radius:12px;background:#fff;letter-spacing:1px;word-break:break-all;}
  .meter{width:250px;height:11px;background:#e5e7eb;border-radius:999px;overflow:hidden;}
  .meterFill{height:100%;width:0;background:var(--good);transition:width .45s ease;}

  /* vault */
  .vault{width:310px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:16px;padding:12px;text-align:left;}
  .vault .vtop{font-weight:800;text-align:center;margin-bottom:8px;}
  .vrow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 11px;border-radius:11px;
    background:#fff;margin:7px 0;border:1px solid #eef0f4;}
  .vrow .vname{font-size:14px;font-weight:700;}
  .vrow .vpw{font-family:"SF Mono",Menlo,monospace;font-size:12px;color:#94a3b8;}
  .vrow .vtag{font-size:12px;font-weight:700;white-space:nowrap;}
  .vrow.warn{border-color:#fde68a;background:#fffbeb;} .vrow.warn .vtag{color:var(--warn);}
  .vrow.safe{border-color:#bbf7d0;background:#f2fdf6;} .vrow.safe .vtag{color:var(--good);}

  #successOverlay{position:absolute;left:10px;right:10px;bottom:10px;top:auto;background:#f2fdf6;
    border:2px solid var(--good);box-shadow:0 10px 28px rgba(0,0,0,.16);display:none;
    flex-direction:row;align-items:center;gap:12px;border-radius:16px;z-index:100;padding:12px 14px;}
  #successOverlay .be{font-size:40px;animation:pop .5s ease;flex-shrink:0;}
  #successOverlay .msg{font-size:17px;font-weight:800;color:var(--good);flex:1;line-height:1.35;}
  #nextBtn{flex-shrink:0;font-size:16px;font-weight:800;color:#fff;cursor:pointer;border:none;
    background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;padding:11px 22px;
    box-shadow:0 4px 12px rgba(99,102,241,.35);animation:nbpulse 1.4s ease-in-out infinite;}
  #nextBtn:hover{filter:brightness(1.05);}
  @keyframes nbpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  @keyframes pop{0%{transform:scale(.3);opacity:0;}70%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
  .confetti{position:fixed;top:-20px;z-index:130;animation:fall linear forwards;pointer-events:none;}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.9;}}

  #finalScreen{display:none;text-align:center;background:#fff;border-radius:18px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,.12);overflow:auto;}
  #finalScreen .tr{font-size:100px;animation:pop .6s ease;}
  button.big{margin-top:12px;font-size:17px;font-weight:700;color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent2));border:none;border-radius:999px;padding:11px 24px;cursor:pointer;}
  button.big.soft{background:#fff;color:var(--accent);border:2px solid var(--accent);}
</style>
</head>
<body>
<div id="app">
  <header>
    <div id="langToggle"><button data-l="ko">한국어</button><button data-l="en">EN</button></div>
    <a id="homeBtn" href="https://dthoma1.github.io/moms-arcade/"><span class="ko">🏠 교실</span><span class="en">🏠 Classroom</span></a>
    <h1 id="h1"></h1>
    <p class="sub" id="sub"></p>
    <div id="progressWrap"><div id="progressBar"></div></div>
    <div id="stepText"></div>
  </header>

  <div id="card">
    <button class="ghostBtn" id="skipBtn" onclick="skipStep()"></button>

    <div id="introView" style="display:none;">
      <div id="introArt">🗄️</div>
      <div id="introTitle"></div>
      <div id="introText"></div>
      <div class="introBtns">
        <button class="big soft" id="introBack" onclick="prevIntro()"></button>
        <button class="big" id="introNext" onclick="nextIntro()"></button>
      </div>
    </div>

    <div id="mainView" style="display:none;">
      <div id="banner">
        <div class="t" id="bTitle"></div>
        <div class="i" id="bInstr"></div>
        <div class="h" id="bHint"></div>
      </div>
      <div id="stage"></div>
      <div id="successOverlay"><div class="be">🎉</div><div class="msg" id="successMsg"></div><button id="nextBtn" onclick="goNext()"></button></div>
    </div>

    <div id="finalScreen">
      <div class="tr">🏆</div>
      <div style="font-size:26px;font-weight:800;" id="finalTitle"></div>
      <div style="font-size:16px;margin-top:8px;line-height:1.7;" id="finalMsg"></div>
      <button class="big" id="restartBtn" onclick="restart()"></button>
      <div style="margin-top:12px;"><a id="hubLink" href="https://dthoma1.github.io/moms-arcade/" style="display:inline-block;text-decoration:none;font-size:15px;font-weight:700;color:#6366f1;background:#eef2ff;border:1px solid #c7d2fe;border-radius:999px;padding:10px 18px;"></a></div>
    </div>
  </div>
</div>

<script>
/* ---------- language ---------- */
let LANG=localStorage.getItem("momLang")||"ko";
function T(o){ return (o&&typeof o==="object"&&("ko" in o))?(o[LANG]!=null?o[LANG]:o.ko):o; }
const UI={
  title:{ko:"엄마의 비밀번호 관리자 배우기 (비밀번호 4편)",en:"Mom's Password Manager Lesson (Password Part 4)"},
  h1:{ko:'🗄️ 엄마의 비밀번호 관리자 배우기 <span style="font-size:14px;color:#6b7280;">(비밀번호 4편)</span>',en:'🗄️ Learning Password Managers <span style="font-size:14px;color:#6b7280;">(Password Part 4)</span>'},
  sub:{ko:"왜 필요할까 · 금고 열기 · 자동 생성 · 자동 채우기 · 위험한 비밀번호 고치기",en:"Why it helps · Unlock the vault · Generate · Autofill · Fix risky passwords"},
  skip:{ko:"건너뛰기 ›",en:"Skip ›"},
  prev:{ko:"‹ 이전",en:"‹ Back"},
  introNext:{ko:"다음 ▶",en:"Next ▶"},
  start:{ko:"시작하기 ▶",en:"Start ▶"},
  next:{ko:"다음 ›",en:"Next ›"},
  restart:{ko:"다시 하기 🔁",en:"Play again 🔁"},
  hub:{ko:"🏠 교실로 돌아가기",en:"🏠 Back to classroom"},
  finalTitle:{ko:"비밀번호 관리자 마스터!",en:"Password manager master!"},
  finalMsg:{ko:"이제 엄마는 알아요 —<br><b>마스터 비밀번호 하나</b>만 기억하면,<br>관리자가 <b>강한 비밀번호를 만들고·저장하고·자동으로 채워</b> 줘요.<br>위험한 비밀번호는 <b>알아서 알려주고 바꿔</b> 줘요 💖",en:"Now you know —<br>remember just <b>one master password</b>,<br>and the manager can <b>create, save, and autofill strong passwords</b> for you.<br>It can also <b>warn you about risky passwords and help change them</b> 💖"},
  step:{ko:(a,b)=>`${a} / ${b} 단계`,en:(a,b)=>`Step ${a} / ${b}`},
  finalStep:{ko:"완료! 🎊",en:"Done! 🎊"}
};
function applyStatic(){
  document.documentElement.lang=LANG; document.title=T(UI.title);
  document.getElementById("h1").innerHTML=T(UI.h1);
  document.getElementById("sub").textContent=T(UI.sub);
  els.skip.textContent=T(UI.skip); els.introBack.textContent=T(UI.prev);
  document.getElementById("restartBtn").textContent=T(UI.restart);
  document.getElementById("nextBtn").textContent=T(UI.next);
  document.getElementById("hubLink").textContent=T(UI.hub);
  document.getElementById("finalTitle").textContent=T(UI.finalTitle);
  document.getElementById("finalMsg").innerHTML=T(UI.finalMsg);
  document.querySelectorAll("#langToggle button").forEach(b=>b.classList.toggle("on",b.dataset.l===LANG));
}
function setLang(l){ LANG=l; localStorage.setItem("momLang",l); applyStatic();
  if(els.final.style.display==="block"){ els.step.textContent=T(UI.finalStep); }
  else if(phase==="intro") showIntro(); else if(!doneGuard) loadLesson(lidx);
}

/* ---------- praise + sound + confetti ---------- */
const PRAISE={ko:["잘했어요! 🎉","완벽해요! 👏","최고예요! ⭐","멋져요! 💖","정확해요! ✨","훌륭해요! 🌟"],
              en:["Well done! 🎉","Perfect! 👏","Great! ⭐","Lovely! 💖","Exactly! ✨","Wonderful! 🌟"]};
const praise=()=>{const a=PRAISE[LANG]||PRAISE.ko;return a[Math.floor(Math.random()*a.length)];};
let actx=null;
function beep(f=660,d=.14){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();o.type="sine";o.frequency.value=f;
  g.gain.setValueAtTime(.0001,actx.currentTime);g.gain.exponentialRampToValueAtTime(.25,actx.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);
  o.start();o.stop(actx.currentTime+d);}catch(e){}}
const chime=()=>{beep(660,.12);setTimeout(()=>beep(880,.16),110);};
const clickSnd=()=>beep(520,.05);
const buzz=()=>{beep(200,.18);};
function confetti(){const E=["🎉","✨","💖","⭐","🌸","🎊","💛"];for(let i=0;i<26;i++){const c=document.createElement("div");
  c.className="confetti";c.textContent=E[Math.floor(Math.random()*E.length)];c.style.left=Math.random()*100+"vw";
  c.style.animationDuration=(1.6+Math.random()*1.4)+"s";c.style.fontSize=(18+Math.random()*20)+"px";
  document.body.appendChild(c);setTimeout(()=>c.remove(),3200);} }

/* ---------- strong password helper ---------- */
function generateStrong(len){
  const U="ABCDEFGHJKLMNPQRSTUVWXYZ", l="abcdefghijkmnpqrstuvwxyz", d="23456789", s="!@#$%^&*?";
  const all=U+l+d+s; let out=[U,l,d,s].map(set=>set[Math.floor(Math.random()*set.length)]);
  for(let i=out.length;i<len;i++) out.push(all[Math.floor(Math.random()*all.length)]);
  return out.sort(()=>Math.random()-0.5).join("");
}

/* ---------- intro (why a manager) ---------- */
let introIdx=0, phase="intro";
const INTRO=[
  { art:"😵", title:{ko:"비밀번호가 너무 많아요!",en:"There are too many passwords!"},
    html:{ko:`좋은 규칙: <b>사이트마다 다른, 길고 강한 비밀번호</b>를 써야 해요.<br><br>
    그런데 은행·쇼핑·이메일·병원… 그걸 <b>다 외우는 건 불가능</b>하죠! 😵‍💫<br><br>
    그렇다고 <b>같은 비밀번호를 여기저기</b> 쓰면, 한 곳만 뚫려도 <b>모든 곳</b>이 위험해져요.`, en:`A good rule is: use a <b>different, long, strong password for every site</b>.<br><br>
    But banking, shopping, email, clinics… <b>remembering them all is impossible</b>! 😵‍💫<br><br>
    If you <b>reuse the same password everywhere</b>, one leak can put <b>every account</b> in danger.`} },
  { art:"🗄️", title:{ko:"그래서 나온 것 — 비밀번호 관리자",en:"That's why password managers were made"},
    html:{ko:`<div class="scene"><span class="fig">🔑🔑🔑</span><span class="arw">➜</span><span class="fig">🗄️</span><span class="arw">➜</span><span class="fig">🔑</span></div>
    <b>비밀번호 관리자</b>는 <b>튼튼한 금고</b>예요.
    엄마의 모든 비밀번호를 <b>대신 기억</b>해 줘요.<br><br>
    엄마는 금고를 여는 <b>마스터 비밀번호 딱 하나</b>만 기억하면 돼요!<br><br>
    아이폰·맥에 이미 들어 있어요(<b>아이클라우드 키체인</b>). 😊`, en:`<div class="scene"><span class="fig">🔑🔑🔑</span><span class="arw">➜</span><span class="fig">🗄️</span><span class="arw">➜</span><span class="fig">🔑</span></div>
    A <b>password manager</b> is like a <b>strong vault</b>.
    It <b>remembers all your passwords</b> for you.<br><br>
    You only need to remember <b>one master password</b> that opens the vault!<br><br>
    It's already on iPhone and Mac (<b>iCloud Keychain</b>). 😊`} },
  { art:"🔐", title:{ko:"이 금고, 안전한가요?",en:"Is this vault safe?"},
    html:{ko:`아주 안전해요! 금고 안은 <b>암호로 꽁꽁 잠겨</b> 있어요.
    엄마의 <b>마스터 비밀번호 + 얼굴(Face ID)</b>로만 열려요.<br><br>
    만든 회사조차 <b>안을 들여다볼 수 없어요</b>.<br><br>
    수첩에 적어 두거나 같은 비밀번호를 돌려쓰는 것보다 <b>훨씬 안전</b>해요. 이제 하나씩 해볼까요? 😊`, en:`Very safe! Everything inside the vault is <b>locked up with encryption</b>.
    It opens only with your <b>master password plus your face (Face ID)</b>.<br><br>
    Even the company that made it <b>can't peek inside</b>.<br><br>
    It's <b>much safer</b> than writing passwords in a notebook or reusing one password. Let's try it step by step. 😊`} },
];

/* ---------- lessons ---------- */
const stage=document.getElementById("stage");
let doneGuard=false;

const LESSONS=[
  { title:{ko:"① 마스터 비밀번호 하나로 금고 열기",en:"① Unlock the vault with one master password"},
    instr:{ko:"금고를 열어 볼까요? 엄마는 <b>마스터 비밀번호 하나</b>만 있으면 돼요. 얼굴(Face ID)로 열어 보세요.",en:"Let's open the vault. You only need <b>one master password</b>. Open it with Face ID."},
    hint:{ko:"딱 하나만 기억하면 나머지는 금고가 다 기억해요. 그게 관리자의 가장 큰 장점이에요.",en:"Remember just one thing, and the vault remembers the rest. That's the manager's biggest benefit."},
    render(stage,done){
      stage.innerHTML=`<div class="panel">
        <div class="note">${T({ko:"비밀번호 관리자는 <b>금고</b> 같아요. 여는 열쇠는 <b>마스터 비밀번호 하나</b>뿐이에요.",en:"A password manager is like a <b>vault</b>. The only key is <b>one master password</b>."})}</div>
        <div class="loginBox"><div style="font-weight:800;margin-bottom:6px;">${T({ko:"🔒 비밀번호 금고 (잠김)",en:"🔒 Password vault (locked)"})}</div><div class="step" style="color:#6b7280;">${T({ko:"마스터 비밀번호로 열어요",en:"Open with the master password"})}</div></div>
        <button class="fpBtn" id="fp">🙂</button>
        <div class="note" id="nt">${T({ko:"얼굴(Face ID) 단추를 눌러 금고를 열어 보세요.",en:"Tap the Face ID button to open the vault."})}</div>
      </div>`;
      const fp=stage.querySelector("#fp"), nt=stage.querySelector("#nt");
      fp.onclick=()=>{ fp.disabled=true; fp.classList.add("scanning"); clickSnd(); nt.textContent=T({ko:"여는 중…",en:"Opening…"});
        setTimeout(()=>{ chime(); stage.innerHTML=`<div class="panel"><div class="vault">
              <div class="vtop">${T({ko:"🔓 비밀번호 금고 (열림)",en:"🔓 Password vault (open)"})}</div>
              <div class="vrow"><span><span class="vname">${T({ko:"🏦 은행",en:"🏦 Bank"})}</span><br><span class="vpw">••••••••••••</span></span><span class="vtag">🔑</span></div>
              <div class="vrow"><span><span class="vname">${T({ko:"🛒 쇼핑몰",en:"🛒 Shopping mall"})}</span><br><span class="vpw">••••••••••••</span></span><span class="vtag">🔑</span></div>
              <div class="vrow"><span><span class="vname">${T({ko:"📧 이메일",en:"📧 Email"})}</span><br><span class="vpw">••••••••••••</span></span><span class="vtag">🔑</span></div>
            </div><div class="note good">${T({ko:"<b>금고가 열렸어요!</b> 저장된 비밀번호가 모두 여기 있어요. 엄마는 이걸 외울 필요가 없죠 🎉",en:"<b>The vault opened!</b> All saved passwords are here. You don't need to memorize them 🎉"})}</div></div>`;
          setTimeout(()=>done("🗄️",{ko:"마스터 비밀번호 하나로 금고를 열었어요!",en:"You opened the vault with one master password!"}),1200);
        },1000);
      };
    }},
  { title:{ko:"② 강한 비밀번호 자동으로 만들기",en:"② Automatically create a strong password"},
    instr:{ko:"새 계정을 만들 때 비밀번호를 직접 짜지 마세요. 관리자가 <b>강한 걸 자동으로</b> 만들어 줘요. 단추를 눌러 보세요.",en:"When making a new account, don't invent a password yourself. The manager can <b>make a strong one automatically</b>. Tap the button."},
    hint:{ko:"엄마가 머리 아프게 고민할 필요가 없어요. 관리자가 아무도 못 맞힐 비밀번호를 만들어 기억까지 해요.",en:"No need to think hard. The manager makes a password nobody can guess and remembers it for you."},
    render(stage,done){
      stage.innerHTML=`<div class="panel">
        <div class="loginBox"><div style="font-weight:800;margin-bottom:4px;">${T({ko:"🛒 새 쇼핑 계정 만들기",en:"🛒 Create a new shopping account"})}</div><div class="step" style="color:#6b7280;">${T({ko:"비밀번호는 관리자가 만들어 줘요",en:"The manager will make the password"})}</div></div>
        <input class="pwField" id="pw" readonly placeholder="${T({ko:"( 아직 비어 있어요 )",en:"( still empty )"})}" />
        <div class="meter"><div class="meterFill" id="mf"></div></div>
        <button class="kbtn" id="gen">${T({ko:"🎲 강한 비밀번호 자동 생성",en:"🎲 Generate a strong password"})}</button>
        <div class="note" id="nt">${T({ko:"단추를 눌러 강력한 비밀번호를 만들어 보세요.",en:"Tap the button to make a strong password."})}</div>
      </div>`;
      const pw=stage.querySelector("#pw"), mf=stage.querySelector("#mf"), gen=stage.querySelector("#gen"), nt=stage.querySelector("#nt");
      gen.onclick=()=>{ clickSnd(); gen.disabled=true; pw.value=generateStrong(16); mf.style.width="100%"; chime(); nt.className="note good";
        nt.innerHTML=T({ko:"<b>아주 강한 비밀번호가 만들어졌어요!</b> 외울 필요 없어요 — 금고가 대신 기억해요 🎉",en:"<b>A very strong password was made!</b> You don't need to memorize it — the vault remembers 🎉"});
        setTimeout(()=>done("🎲",{ko:"관리자가 강한 비밀번호를 만들어 줬어요!",en:"The manager created a strong password!"}),1000);
      };
    }},
  { title:{ko:"③ 자동 채우기로 로그인",en:"③ Log in with autofill"},
    instr:{ko:"로그인할 때 <b>타이핑하지 않아요</b>. ‘관리자로 채우기’를 누르고 얼굴로 확인하면 끝!",en:"When logging in, <b>you don't type</b>. Tap ‘Fill with manager’ and confirm with your face — done!"},
    hint:{ko:"관리자가 저장해 둔 비밀번호를 자동으로 넣어 줘요. 엄마는 아무것도 외우거나 칠 필요가 없어요.",en:"The manager automatically enters the saved password. You don't have to remember or type anything."},
    render(stage,done){
      stage.innerHTML=`<div class="panel">
        <div class="loginBox"><div style="font-weight:800;margin-bottom:6px;">${T({ko:"🏦 은행 로그인",en:"🏦 Bank login"})}</div><div class="step">${T({ko:"아이디",en:"ID"})} <span class="ok">${T({ko:"✅ 채워짐",en:"✅ Filled"})}</span></div><div class="step">${T({ko:"비밀번호",en:"Password"})} <span id="pwState" style="color:#6b7280;">${T({ko:"( 비어 있음 )",en:"( empty )"})}</span></div></div>
        <button class="kbtn" id="fill">${T({ko:"🔑 비밀번호 관리자로 채우기",en:"🔑 Fill with password manager"})}</button>
        <button class="fpBtn" id="fp" style="display:none;">🙂</button>
        <div class="note" id="nt">${T({ko:"‘관리자로 채우기’를 눌러 보세요.",en:"Tap ‘Fill with password manager’."})}</div>
      </div>`;
      const fill=stage.querySelector("#fill"), fp=stage.querySelector("#fp"), nt=stage.querySelector("#nt"), pwState=stage.querySelector("#pwState");
      fill.onclick=()=>{ clickSnd(); fill.disabled=true; fill.style.display="none"; fp.style.display="flex"; nt.innerHTML=T({ko:"얼굴(Face ID)로 확인하면 자동으로 채워져요.",en:"Confirm with Face ID, and it will fill automatically."}); };
      fp.onclick=()=>{ fp.disabled=true; fp.classList.add("scanning"); clickSnd(); nt.textContent=T({ko:"확인 중…",en:"Checking…"});
        setTimeout(()=>{ fp.textContent="✅"; pwState.innerHTML="<b style='color:#22c55e'>••••••••••••</b>"; chime(); nt.className="note good"; nt.innerHTML=T({ko:"<b>자동으로 채워졌어요 — 로그인 성공!</b> 타이핑 한 번 없이 끝! 🎉",en:"<b>It filled automatically — login successful!</b> Done with no typing 🎉"});
          setTimeout(()=>done("⚡",{ko:"관리자가 자동으로 채워 줬어요!",en:"The manager filled it automatically!"}),900);
        },1000);
      };
    }},
  { title:{ko:"④ 위험한 비밀번호 바꾸기",en:"④ Change a risky password"},
    instr:{ko:"관리자가 <b>보안 점검</b>을 했더니 위험한 비밀번호를 찾았어요! ‘새로 바꾸기’를 눌러 안전하게 만드세요.",en:"The manager ran a <b>security check</b> and found a risky password! Tap ‘Change it’ to make it safe."},
    hint:{ko:"약하거나 유출된 비밀번호를 관리자가 알아서 찾아 줘요. 한 번 눌러 강한 새 비밀번호로 바꾸면 끝이에요.",en:"The manager finds weak or leaked passwords for you. One tap changes it to a strong new password."},
    render(stage,done){
      stage.innerHTML=`<div class="panel">
        <div class="note warn">${T({ko:"🔎 관리자가 <b>보안 점검</b>을 했어요. 위험한 비밀번호를 하나 찾았어요!",en:"🔎 The manager ran a <b>security check</b> and found one risky password!"})}</div>
        <div class="vault"><div class="vtop">${T({ko:"🛡️ 보안 점검",en:"🛡️ Security check"})}</div>
          <div class="vrow warn" id="row1"><span><span class="vname">${T({ko:"🛒 쇼핑몰",en:"🛒 Shopping mall"})}</span><br><span class="vpw" id="pw1">123456</span></span><span class="vtag" id="tag1">${T({ko:"⚠️ 약함·유출됨",en:"⚠️ Weak · leaked"})}</span></div>
          <div class="vrow safe"><span><span class="vname">${T({ko:"🏦 은행",en:"🏦 Bank"})}</span><br><span class="vpw">••••••••••••</span></span><span class="vtag">${T({ko:"✅ 안전",en:"✅ Safe"})}</span></div>
        </div>
        <button class="kbtn" id="fix">${T({ko:"🔁 쇼핑몰 비밀번호 새로 바꾸기",en:"🔁 Change the shopping password"})}</button>
        <div class="note" id="nt">${T({ko:"위험한 비밀번호를 강한 것으로 바꿔 주세요.",en:"Change the risky password to a strong one."})}</div>
      </div>`;
      const fix=stage.querySelector("#fix"), row1=stage.querySelector("#row1"), pw1=stage.querySelector("#pw1"), tag1=stage.querySelector("#tag1"), nt=stage.querySelector("#nt");
      fix.onclick=()=>{ clickSnd(); fix.disabled=true; pw1.textContent="••••••••••••"; row1.className="vrow safe"; tag1.textContent=T({ko:"✅ 안전",en:"✅ Safe"}); chime();
        nt.className="note good"; nt.innerHTML=T({ko:"<b>강한 새 비밀번호로 바꿨어요!</b> 이제 모든 계정이 안전해요 🎉",en:"<b>Changed to a strong new password!</b> Now every account is safer 🎉"});
        setTimeout(()=>done("🛡️",{ko:"관리자가 위험한 비밀번호를 고쳐 줬어요!",en:"The manager fixed the risky password!"}),1000);
      };
    }},
];

/* ---------- engine ---------- */
let lidx=0;
const els={ bar:document.getElementById("progressBar"), step:document.getElementById("stepText"),
  intro:document.getElementById("introView"), introArt:document.getElementById("introArt"),
  introTitle:document.getElementById("introTitle"), introText:document.getElementById("introText"),
  introBack:document.getElementById("introBack"),
  main:document.getElementById("mainView"), final:document.getElementById("finalScreen"),
  overlay:document.getElementById("successOverlay"), msg:document.getElementById("successMsg"), skip:document.getElementById("skipBtn"),
  bTitle:document.getElementById("bTitle"), bInstr:document.getElementById("bInstr"), bHint:document.getElementById("bHint") };
const totalSteps=INTRO.length+LESSONS.length;
function doneCount(){ return phase==="intro"?introIdx:INTRO.length+lidx; }
function updateProgress(){ els.step.textContent=UI.step[LANG](doneCount()+1,totalSteps); els.bar.style.width=(doneCount()/totalSteps*100)+"%"; }

function showIntro(){ phase="intro"; els.intro.style.display="flex"; els.main.style.display="none"; els.final.style.display="none";
  const c=INTRO[introIdx]; els.introArt.textContent=c.art; els.introTitle.textContent=T(c.title); els.introText.innerHTML=T(c.html);
  els.introBack.style.visibility=introIdx===0?"hidden":"visible";
  document.getElementById("introNext").textContent=introIdx===INTRO.length-1?T(UI.start):T(UI.introNext); updateProgress(); }
function nextIntro(){ if(introIdx<INTRO.length-1){ introIdx++; showIntro(); } else startLessons(); }
function prevIntro(){ if(introIdx>0){ introIdx--; showIntro(); } }
function startLessons(){ phase="lessons"; lidx=0; els.intro.style.display="none"; els.main.style.display="flex"; loadLesson(0); }

function loadLesson(i){
  const lv=LESSONS[i]; doneGuard=false;
  els.bTitle.textContent=T(lv.title); els.bInstr.innerHTML=T(lv.instr); els.bHint.textContent="💡 "+T(lv.hint);
  updateProgress(); els.overlay.style.display="none"; stage.innerHTML="";
  lv.render(stage,onDone);
}
function onDone(emoji,msg){
  if(doneGuard) return; doneGuard=true;
  els.bar.style.width=((INTRO.length+lidx+1)/totalSteps*100)+"%";
  els.msg.textContent=msg?T(msg):praise(); els.overlay.querySelector(".be").textContent=emoji||"🎉";
  els.overlay.style.display="flex"; confetti(); chime();
}
function goNext(){
  els.overlay.style.display="none"; lidx++; if(lidx>=LESSONS.length) showFinal(); else loadLesson(lidx);
}
function skipStep(){ if(phase==="intro"){ nextIntro(); return; } doneGuard=true;
  lidx++; if(lidx>=LESSONS.length) showFinal(); else loadLesson(lidx); }
function showFinal(){ els.main.style.display="none"; els.skip.style.display="none"; els.final.style.display="block";
  try{localStorage.setItem("momHub:done:passwords4","1");}catch(e){}
  els.bar.style.width="100%"; els.step.textContent=T(UI.finalStep); confetti(); setTimeout(confetti,500); setTimeout(confetti,1000); chime(); }
function restart(){ introIdx=0; lidx=0; els.skip.style.display="block"; els.final.style.display="none"; showIntro(); }

document.querySelectorAll("#langToggle button").forEach(b=>b.addEventListener("click",()=>setLang(b.dataset.l)));
applyStatic(); showIntro();
</script>
