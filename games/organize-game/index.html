<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>캔바 정리하기 · Getting Organized</title>
<style>
  :root{--accent:#6366f1;--accent2:#ec4899;--good:#22c55e;--bad:#ef4444;--warn:#f59e0b;--soft:#6b7280;--cv:#7c3aed;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:linear-gradient(160deg,#eef2ff,#fdf2f8);color:#1f2937;-webkit-font-smoothing:antialiased;}
  #app{max-width:820px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:12px 14px 24px;}
  header{position:relative;text-align:center;}
  #langToggle{position:absolute;top:0;right:0;display:flex;gap:4px;}
  #langToggle button{font-size:14px;font-weight:700;border:1px solid #c7d2fe;background:#fff;color:#6366f1;border-radius:999px;padding:5px 11px;cursor:pointer;}
  #langToggle button.on{background:#6366f1;color:#fff;}
  #homeBtn{position:absolute;top:0;left:0;text-decoration:none;font-size:15px;font-weight:700;color:#6366f1;background:#eef2ff;border:1px solid #c7d2fe;border-radius:999px;padding:6px 12px;}
  h1{font-size:23px;margin:6px 0 2px;}
  .sub{font-size:15px;color:var(--soft);margin:0 0 8px;}
  #progressWrap{height:9px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:8px auto 4px;max-width:520px;}
  #progressBar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease;}
  #stepText{font-size:13px;color:var(--soft);margin-bottom:8px;}
  #card{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;}
  .ghostBtn{position:absolute;top:-2px;right:0;font-size:13px;color:#9ca3af;background:none;border:none;cursor:pointer;z-index:5;}

  /* intro */
  #introView{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;
    background:#fff;border-radius:18px;padding:26px 22px;box-shadow:0 12px 30px rgba(99,102,241,.14);}
  #introArt{font-size:74px;}
  #introTitle{font-size:24px;font-weight:800;}
  #introText{font-size:17px;line-height:1.7;max-width:580px;color:#374151;}
  #introText b{color:var(--accent);}
  .scene{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin:6px 0 10px;font-size:30px;}
  .scene .arw{color:#9ca3af;font-size:24px;}
  .introBtns{display:flex;gap:12px;margin-top:6px;}
  .big{font-size:17px;font-weight:800;color:#fff;background:linear-gradient(90deg,var(--accent),var(--accent2));
    border:none;border-radius:999px;padding:12px 26px;cursor:pointer;box-shadow:0 6px 16px rgba(99,102,241,.3);}
  .big.soft{background:#fff;color:var(--accent);border:2px solid var(--accent);box-shadow:none;}

  /* main */
  #mainView{flex:1;display:flex;flex-direction:column;min-height:0;}
  #banner{background:#fff;border-radius:14px;padding:11px 15px;box-shadow:0 8px 20px rgba(99,102,241,.10);margin-bottom:10px;}
  #banner .t{font-size:18px;font-weight:800;color:var(--accent);}
  #banner .i{font-size:16px;margin-top:3px;line-height:1.5;}
  #banner .i b{color:var(--accent2);}
  #banner .hint{font-size:14px;color:var(--soft);margin-top:4px;}
  #stage{position:relative;flex:1;min-height:0;display:flex;}

  /* ---- simplified Canva mock ---- */
  .canva{position:relative;flex:1;display:flex;min-height:340px;background:#fff;border:1px solid #e5e7eb;
    border-radius:16px;overflow:hidden;box-shadow:0 12px 30px rgba(99,102,241,.12);}
  .cvside{width:132px;flex:none;background:#f7f7fb;border-right:1px solid #ececf3;padding:12px 8px;display:flex;flex-direction:column;gap:3px;}
  .cvlogo{font-family:"Brush Script MT","Segoe Script",cursive;font-size:24px;font-weight:800;
    background:linear-gradient(90deg,#00c4cc,#7c3aed,#ec4899);-webkit-background-clip:text;background-clip:text;color:transparent;padding:2px 6px 8px;}
  .cvnav{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:#4b5563;background:none;border:none;
    border-radius:10px;padding:9px 8px;cursor:pointer;text-align:left;width:100%;}
  .cvnav .ic{font-size:17px;}
  .cvnav:hover{background:#efeaff;}
  .cvnav.on{background:#efeaff;color:var(--cv);}
  .cvmain{flex:1;min-width:0;overflow:auto;padding:14px 16px;}
  .cvtop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
  .cvtitle{font-size:20px;font-weight:800;color:#1f2937;}
  .cvsearch{flex:1;max-width:280px;display:flex;align-items:center;gap:8px;color:#9ca3af;font-size:14px;
    background:#f3f4f6;border:1px solid #e5e7eb;border-radius:999px;padding:8px 14px;}
  .cvsec{margin-bottom:16px;}
  .cvh{font-size:16px;font-weight:800;color:#374151;margin:2px 0 10px;display:flex;align-items:center;gap:8px;}
  .cvgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;}
  .cvcard{background:#fff;border:1px solid #eef0f4;border-radius:12px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.06);
    cursor:grab;transition:transform .12s ease,box-shadow .12s ease;touch-action:none;}
  .cvcard:active{cursor:grabbing;}
  .cvcard.drag-on:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(99,102,241,.18);}
  .cvthumb{height:78px;display:flex;align-items:center;justify-content:center;font-size:34px;}
  .cvcap{padding:7px 9px;}
  .cvname{font-size:14px;font-weight:700;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cvsub{font-size:12px;color:#8b93a1;margin-top:1px;}
  .cvcard.dragging{opacity:.35;}
  .cvghost{position:fixed;z-index:200;pointer-events:none;opacity:.95;transform:rotate(-3deg);border-radius:12px;overflow:hidden;
    box-shadow:0 16px 36px rgba(0,0,0,.28);background:#fff;border:1px solid #eef0f4;}
  .cvfolders{display:flex;gap:14px;flex-wrap:wrap;}
  .cvfolder{width:150px;background:#f7f8fb;border:2px solid #e7e9f0;border-radius:14px;padding:14px 12px;text-align:center;cursor:pointer;
    transition:transform .12s ease,border-color .12s ease,background .12s ease;}
  .cvfolder:hover{transform:translateY(-2px);}
  .cvfolder.hot{border-color:var(--accent);background:#eef2ff;transform:scale(1.04);}
  .cvficon{font-size:40px;line-height:1;}
  .cvfname{font-size:15px;font-weight:800;color:#1f2937;margin-top:6px;}
  .cvfcount{font-size:12px;color:#8b93a1;margin-top:2px;}
  .cvnewf{width:150px;min-height:104px;border:2px dashed #c7cbd6;background:#fff;color:var(--cv);border-radius:14px;
    font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
  .cvnewf:hover{background:#f7f5ff;border-color:var(--cv);}
  .cvback{background:none;border:none;color:var(--cv);font-size:15px;font-weight:800;cursor:pointer;padding:0 0 8px;}
  .cvempty{font-size:14px;color:#9ca3af;padding:8px 2px;}
  .cvtoast{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);background:#fff1f2;border:2px solid #fecdd3;
    color:#be123c;font-size:14px;font-weight:800;padding:9px 16px;border-radius:999px;box-shadow:0 8px 20px rgba(0,0,0,.14);
    z-index:30;animation:toastIn .2s ease;text-align:center;}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}
  @keyframes shakeX{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
  .shakeX{animation:shakeX .3s ease;}

  /* pulsing focus ring */
  .focusRing{position:absolute;width:34px;height:34px;margin:-17px 0 0 -17px;border-radius:50%;
    border:3px solid var(--accent2);background:rgba(236,72,153,.10);pointer-events:none;z-index:18;
    animation:focusPulse 1.4s ease-in-out infinite;}
  @keyframes focusPulse{0%,100%{box-shadow:0 0 0 0 rgba(236,72,153,.45);transform:scale(1);}
    50%{box-shadow:0 0 0 12px rgba(236,72,153,0);transform:scale(1.12);}}

  #successOverlay{position:absolute;left:8px;right:8px;bottom:8px;background:#f2fdf6;border:2px solid var(--good);
    box-shadow:0 10px 28px rgba(0,0,0,.16);display:none;flex-direction:row;align-items:center;gap:12px;border-radius:16px;z-index:40;padding:12px 14px;}
  #successOverlay .be{font-size:38px;animation:pop .5s ease;}
  #successOverlay .msg{font-size:17px;font-weight:800;color:var(--good);flex:1;line-height:1.35;}
  #nextBtn{font-size:16px;font-weight:800;color:#fff;cursor:pointer;border:none;
    background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;padding:11px 22px;
    box-shadow:0 4px 12px rgba(99,102,241,.35);animation:nbpulse 1.4s ease-in-out infinite;}
  @keyframes nbpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  @keyframes pop{0%{transform:scale(.3);opacity:0;}70%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
  .confetti{position:fixed;top:-20px;z-index:130;animation:fall linear forwards;pointer-events:none;}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.9;}}

  #finalScreen{display:none;text-align:center;background:#fff;border-radius:18px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,.12);}
  #finalScreen .tr{font-size:96px;animation:pop .6s ease;}
  #hubLink{display:inline-block;text-decoration:none;font-size:15px;font-weight:700;color:#6366f1;background:#eef2ff;border:1px solid #c7d2fe;border-radius:999px;padding:10px 18px;margin-top:12px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div id="langToggle"><button data-l="ko">한국어</button><button data-l="en">EN</button></div>
    <a id="homeBtn" href="https://dthoma1.github.io/moms-arcade/"><span class="ko">🏠 교실</span></a>
    <h1 id="h1"></h1>
    <p class="sub" id="sub"></p>
    <div id="progressWrap"><div id="progressBar"></div></div>
    <div id="stepText"></div>
  </header>

  <div id="card">
    <button class="ghostBtn" id="skipBtn" onclick="skipStep()"></button>

    <div id="introView" style="display:none;">
      <div id="introArt">📁</div>
      <div id="introTitle"></div>
      <div id="introText"></div>
      <div class="introBtns">
        <button class="big soft" id="introBack" onclick="prevIntro()"></button>
        <button class="big" id="introNext" onclick="nextIntro()"></button>
      </div>
    </div>

    <div id="mainView" style="display:none;">
      <div id="banner">
        <div class="t" id="bTitle"></div>
        <div class="i" id="bInstr"></div>
        <div class="hint" id="bHint"></div>
      </div>
      <div id="stage"></div>
      <div id="successOverlay"><div class="be">🎉</div><div class="msg" id="successMsg"></div><button id="nextBtn" onclick="goNext()"></button></div>
    </div>

    <div id="finalScreen">
      <div class="tr">🏆</div>
      <div style="font-size:26px;font-weight:800;" id="finalTitle"></div>
      <div style="font-size:16px;margin-top:8px;line-height:1.7;" id="finalMsg"></div>
      <button class="big" id="restartBtn" onclick="restart()" style="margin-top:14px;"></button>
      <div><a id="hubLink" href="https://dthoma1.github.io/moms-arcade/"></a></div>
    </div>
  </div>
</div>

<script>
/* ---------- language ---------- */
let LANG=localStorage.getItem("momLang")||"ko";
function T(o){ return (o&&typeof o==="object"&&("ko" in o))?(o[LANG]!=null?o[LANG]:o.ko):o; }
const UI={
  title:{ko:"캔바 정리하기 — 프로젝트와 폴더",en:"Getting Organized — Projects & Folders"},
  h1:{ko:"📁 캔바 정리하기 <span style='font-size:14px;color:#6b7280;'>(프로젝트·폴더)</span>",en:"📁 Getting Organized <span style='font-size:14px;color:#6b7280;'>(Projects & Folders)</span>"},
  sub:{ko:"홈 · 프로젝트 · 폴더로 사진 정리하기",en:"Home · Projects · Folders"},
  skip:{ko:"건너뛰기 ›",en:"Skip ›"},
  prev:{ko:"‹ 이전",en:"‹ Back"},
  introNext:{ko:"다음 ▶",en:"Next ▶"},
  start:{ko:"시작하기 ▶",en:"Start ▶"},
  next:{ko:"다음 ›",en:"Next ›"},
  restart:{ko:"다시 하기 🔁",en:"Play again 🔁"},
  hub:{ko:"🏠 교실로 돌아가기",en:"🏠 Back to classroom"},
  home:{ko:"🏠 교실",en:"🏠 Classroom"},
  finalTitle:{ko:"정리 마스터!",en:"Organizing master!"},
  finalMsg:{ko:"이제 엄마는 <b>프로젝트</b>로 가서, <b>폴더</b>를 만들고, 사진을 <b>끌어다 넣어</b> 정리할 수 있어요!<br>이렇게 하면 준희처럼 사진을 <b>몇 초 만에</b> 찾을 수 있어요 💖",en:"Now you can go to <b>Projects</b>, make <b>folders</b>, and <b>drag</b> photos to organize them!<br>Just like Junhee, you can find a photo in <b>seconds</b> 💖"},
  step:{ko:(a,b)=>`${a} / ${b} 단계`,en:(a,b)=>`Step ${a} / ${b}`},
  finalStep:{ko:"완료! 🎊",en:"Done! 🎊"}
};
function applyStatic(){
  document.documentElement.lang=LANG; document.title=T(UI.title);
  document.getElementById("h1").innerHTML=T(UI.h1);
  document.getElementById("sub").textContent=T(UI.sub);
  els.skip.textContent=T(UI.skip); els.introBack.textContent=T(UI.prev);
  document.getElementById("restartBtn").textContent=T(UI.restart);
  document.getElementById("nextBtn").textContent=T(UI.next);
  document.getElementById("hubLink").textContent=T(UI.hub);
  document.querySelector("#homeBtn .ko").textContent=T(UI.home);
  document.getElementById("finalTitle").textContent=T(UI.finalTitle);
  document.getElementById("finalMsg").innerHTML=T(UI.finalMsg);
  document.querySelectorAll("#langToggle button").forEach(b=>b.classList.toggle("on",b.dataset.l===LANG));
}
function setLang(l){ LANG=l; localStorage.setItem("momLang",l); applyStatic();
  if(els.final.style.display==="block"){ els.step.textContent=T(UI.finalStep); }
  else if(phase==="intro") showIntro(); else if(!doneGuard) loadLesson(lidx);
}

/* ---------- praise + sound + confetti ---------- */
const PRAISE={ko:["잘했어요! 🎉","완벽해요! 👏","최고예요! ⭐","멋져요! 💖","정확해요! ✨"],
              en:["Well done! 🎉","Perfect! 👏","Great! ⭐","Lovely! 💖","Exactly! ✨"]};
const praise=()=>{const a=PRAISE[LANG]||PRAISE.ko;return a[Math.floor(Math.random()*a.length)];};
let actx=null;
function beep(f=660,d=.12){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();o.type="sine";o.frequency.value=f;
  g.gain.setValueAtTime(.0001,actx.currentTime);g.gain.exponentialRampToValueAtTime(.22,actx.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);
  o.start();o.stop(actx.currentTime+d);}catch(e){}}
const chime=()=>{beep(660,.12);setTimeout(()=>beep(880,.16),110);};
const clickSnd=()=>beep(520,.05);
function confetti(){const E=["🎉","✨","💖","⭐","🌸","🎊"];for(let i=0;i<24;i++){const c=document.createElement("div");
  c.className="confetti";c.textContent=E[Math.floor(Math.random()*E.length)];c.style.left=Math.random()*100+"vw";
  c.style.animationDuration=(1.6+Math.random()*1.4)+"s";c.style.fontSize=(18+Math.random()*20)+"px";
  document.body.appendChild(c);setTimeout(()=>c.remove(),3200);} }

/* ---------- Canva mock ---------- */
const WED={kim:{ko:"김 결혼식",en:"Kim wedding"}, lee:{ko:"이 결혼식",en:"Lee wedding"}};
const NAVS=[
  {id:"create",ic:"➕",label:{ko:"만들기",en:"Create"}},
  {id:"home",ic:"🏠",label:{ko:"홈",en:"Home"}},
  {id:"projects",ic:"📁",label:{ko:"프로젝트",en:"Projects"}},
  {id:"templates",ic:"🔲",label:{ko:"템플릿",en:"Templates"}},
];
function basePhotos(){ return [
  {id:"p1",wed:"kim",emoji:"💍",title:{ko:"반지",en:"Rings"},c1:"#fbcfe8",c2:"#f472b6",folder:null},
  {id:"p2",wed:"lee",emoji:"🥂",title:{ko:"건배",en:"Toast"},c1:"#fde68a",c2:"#f59e0b",folder:null},
  {id:"p3",wed:"kim",emoji:"💐",title:{ko:"부케",en:"Bouquet"},c1:"#ddd6fe",c2:"#a78bfa",folder:null},
  {id:"p4",wed:"lee",emoji:"💒",title:{ko:"예식장",en:"Venue"},c1:"#bfdbfe",c2:"#60a5fa",folder:null},
]; }

function renderCanva(stage, state, cfg){
  cfg=cfg||{};
  stage.innerHTML=`<div class="canva"></div>`;
  const frame=stage.querySelector(".canva");
  const ctrl={};
  let focusTarget=null;

  function cardHTML(p){
    return `<div class="cvcard ${cfg.drag?'drag-on':''}" data-id="${p.id}">
      <div class="cvthumb" style="background:linear-gradient(135deg,${p.c1},${p.c2})">${p.emoji}</div>
      <div class="cvcap"><div class="cvname">${T(p.title)}</div><div class="cvsub">${T(WED[p.wed])}</div></div>
    </div>`;
  }
  function folderHTML(wed){
    const n=state.photos.filter(p=>p.folder===wed).length;
    return `<div class="cvfolder" data-wed="${wed}">
      <div class="cvficon">📁</div><div class="cvfname">${T(WED[wed])}</div>
      <div class="cvfcount">${T({ko:n+"개",en:n+" item"+(n===1?"":"s")})}</div></div>`;
  }
  function grid(list,emptyMsg){
    if(!list.length) return `<div class="cvempty">${T(emptyMsg||{ko:"(비어 있어요)",en:"(empty)"})}</div>`;
    return `<div class="cvgrid">${list.map(cardHTML).join("")}</div>`;
  }
  function bodyHTML(){
    if(state.view==="folder"){
      const list=state.photos.filter(p=>p.folder===state.open);
      return `<button class="cvback">‹ ${T({ko:"프로젝트",en:"Projects"})}</button>
        <div class="cvh">📁 ${T(WED[state.open])}</div>${grid(list)}`;
    }
    const loose=state.photos.filter(p=>p.folder===null);
    if(state.view==="projects"){
      let folders=state.folders.map(folderHTML).join("");
      if(cfg.newFolder) folders+=`<button class="cvnewf">＋ ${T({ko:"새 폴더",en:"New folder"})}</button>`;
      return `<div class="cvsec"><div class="cvh">${T({ko:"최근",en:"Recents"})}</div>
          ${grid(loose,{ko:"최근 항목이 없어요",en:"No recent items"})}</div>
        <div class="cvsec"><div class="cvh">${T({ko:"폴더",en:"Folders"})}</div>
          <div class="cvfolders">${folders||`<div class="cvempty">${T({ko:"아직 폴더가 없어요",en:"No folders yet"})}</div>`}</div></div>`;
    }
    return `<div class="cvsec"><div class="cvh">${T({ko:"최근 항목",en:"Recent designs"})}</div>
      ${grid(loose,{ko:"최근 항목이 없어요",en:"No recent items"})}</div>`;
  }
  function topTitle(){
    if(state.view==="projects"||state.view==="folder") return {ko:"모든 프로젝트",en:"All projects"};
    return {ko:"무엇을 디자인할까요?",en:"What will you design today?"};
  }
  function draw(){
    const active = state.view==="home"?"home":(state.view==="create"?"create":"projects");
    frame.innerHTML=`
      <aside class="cvside">
        <div class="cvlogo">Canva</div>
        ${NAVS.map(n=>`<button class="cvnav ${n.id===active?'on':''}" data-nav="${n.id}"><span class="ic">${n.ic}</span>${T(n.label)}</button>`).join("")}
      </aside>
      <main class="cvmain">
        <div class="cvtop"><div class="cvtitle">${T(topTitle())}</div>
          <div class="cvsearch">🔍 ${T({ko:"검색",en:"Search"})}</div></div>
        ${bodyHTML()}
      </main>`;
    bind();
    if(focusTarget) placeRing(focusTarget);
  }

  function clearFocus(){ focusTarget=null; const r=frame.querySelector(".focusRing"); if(r) r.remove(); }
  function placeRing(sel){
    const r=frame.querySelector(".focusRing"); if(r) r.remove();
    const el=frame.querySelector(sel); if(!el) return;
    const er=el.getBoundingClientRect(), fr=frame.getBoundingClientRect();
    const ring=document.createElement("div"); ring.className="focusRing";
    ring.style.left=(er.left+er.width/2-fr.left)+"px"; ring.style.top=(er.top+er.height/2-fr.top)+"px";
    frame.appendChild(ring);
  }
  ctrl.focusOn=sel=>{ focusTarget=sel; requestAnimationFrame(()=>placeRing(sel)); };

  function toast(msg){
    const t=document.createElement("div"); t.className="cvtoast"; t.textContent=T(msg);
    frame.appendChild(t); setTimeout(()=>t.remove(),1500);
  }

  function folderUnder(x,y){ const el=document.elementFromPoint(x,y); return el?el.closest(".cvfolder"):null; }

  function enableDrag(card){
    card.addEventListener("pointerdown",e=>{
      e.preventDefault(); clearFocus();
      const p=state.photos.find(x=>x.id===card.dataset.id); if(!p) return;
      const r=card.getBoundingClientRect();
      const ghost=card.cloneNode(true); ghost.className="cvghost";
      ghost.style.width=r.width+"px"; ghost.style.height=r.height+"px";
      ghost.style.left=r.left+"px"; ghost.style.top=r.top+"px";
      document.body.appendChild(ghost); card.classList.add("dragging"); clickSnd();
      const offx=e.clientX-r.left, offy=e.clientY-r.top;
      function move(ev){
        ghost.style.left=(ev.clientX-offx)+"px"; ghost.style.top=(ev.clientY-offy)+"px";
        const f=folderUnder(ev.clientX,ev.clientY);
        frame.querySelectorAll(".cvfolder").forEach(el=>el.classList.toggle("hot",el===f));
      }
      function up(ev){
        document.removeEventListener("pointermove",move); document.removeEventListener("pointerup",up);
        const f=folderUnder(ev.clientX,ev.clientY); ghost.remove(); card.classList.remove("dragging");
        if(f){
          const wed=f.dataset.wed;
          if(wed===p.wed){ p.folder=wed; chime(); draw(); cfg.onAction && cfg.onAction("filed",{id:p.id,wed:wed}); return; }
          beep(240,.14); toast({ko:"이 사진은 "+T(WED[p.wed])+" 사진이에요!",en:"That photo is from the "+T(WED[p.wed])+"!"});
          frame.querySelectorAll(".cvfolder").forEach(el=>el.classList.remove("hot"));
          card.classList.add("shakeX"); setTimeout(()=>card.classList.remove("shakeX"),320);
          cfg.onAction && cfg.onAction("wrong",{id:p.id,wed:wed}); return;
        }
        frame.querySelectorAll(".cvfolder").forEach(el=>el.classList.remove("hot"));
      }
      document.addEventListener("pointermove",move); document.addEventListener("pointerup",up);
    });
  }

  function bind(){
    frame.querySelectorAll(".cvnav").forEach(b=>b.addEventListener("click",()=>{
      clearFocus(); clickSnd(); const id=b.dataset.nav;
      if(cfg.allowNav && (id==="home"||id==="projects")){ state.view=id; state.open=null; draw(); }
      cfg.onAction && cfg.onAction("nav",{id});
    }));
    const nf=frame.querySelector(".cvnewf");
    if(nf) nf.addEventListener("click",()=>{
      clearFocus(); clickSnd();
      const order=["kim","lee"]; const next=order.find(w=>state.folders.indexOf(w)<0);
      if(next){ state.folders.push(next); draw(); cfg.onAction && cfg.onAction("newfolder",{wed:next}); }
    });
    frame.querySelectorAll(".cvfolder").forEach(f=>f.addEventListener("click",()=>{
      if(!cfg.openable) return;
      clearFocus(); clickSnd(); const wed=f.dataset.wed; state.view="folder"; state.open=wed; draw();
      cfg.onAction && cfg.onAction("open",{wed});
    }));
    const back=frame.querySelector(".cvback");
    if(back) back.addEventListener("click",()=>{ clickSnd(); state.view="projects"; state.open=null; draw(); });
    if(cfg.drag) frame.querySelectorAll(".cvcard").forEach(enableDrag);
  }

  draw();
  return ctrl;
}

/* ---------- engine ---------- */
let lidx=0, introIdx=0, phase="intro";
const els={ bar:document.getElementById("progressBar"), step:document.getElementById("stepText"),
  intro:document.getElementById("introView"), introArt:document.getElementById("introArt"),
  introTitle:document.getElementById("introTitle"), introText:document.getElementById("introText"),
  introBack:document.getElementById("introBack"),
  main:document.getElementById("mainView"), final:document.getElementById("finalScreen"),
  overlay:document.getElementById("successOverlay"), msg:document.getElementById("successMsg"), skip:document.getElementById("skipBtn"),
  bTitle:document.getElementById("bTitle"), bInstr:document.getElementById("bInstr"), bHint:document.getElementById("bHint") };
const totalSteps=INTRO.length+LESSONS.length;
function doneCount(){ return phase==="intro"?introIdx:INTRO.length+lidx; }
function updateProgress(){ els.step.textContent=UI.step[LANG](doneCount()+1,totalSteps); els.bar.style.width=(doneCount()/totalSteps*100)+"%"; }

function showIntro(){ phase="intro"; els.intro.style.display="flex"; els.main.style.display="none"; els.final.style.display="none";
  const c=INTRO[introIdx]; els.introArt.textContent=c.art; els.introTitle.textContent=T(c.title); els.introText.innerHTML=T(c.html);
  els.introBack.style.visibility=introIdx===0?"hidden":"visible";
  document.getElementById("introNext").textContent=introIdx===INTRO.length-1?T(UI.start):T(UI.introNext); updateProgress(); }
function nextIntro(){ if(introIdx<INTRO.length-1){ introIdx++; showIntro(); } else startLessons(); }
function prevIntro(){ if(introIdx>0){ introIdx--; showIntro(); } }
function startLessons(){ phase="lessons"; lidx=0; els.intro.style.display="none"; els.main.style.display="flex"; loadLesson(0); }

function loadLesson(i){
  const lv=LESSONS[i]; doneGuard=false;
  els.bTitle.textContent=T(lv.title); els.bInstr.innerHTML=T(lv.instr); els.bHint.textContent="💡 "+T(lv.hint);
  updateProgress(); els.overlay.style.display="none"; stage.innerHTML="";
  lv.render(stage,onDone);
}
function onDone(emoji,msg){
  if(doneGuard) return; doneGuard=true;
  els.bar.style.width=((INTRO.length+lidx+1)/totalSteps*100)+"%";
  els.msg.textContent=msg?T(msg):praise(); els.overlay.querySelector(".be").textContent=emoji||"🎉";
  els.overlay.style.display="flex"; confetti(); chime();
}
function goNext(){ els.overlay.style.display="none"; lidx++; if(lidx>=LESSONS.length) showFinal(); else loadLesson(lidx); }
function skipStep(){ if(phase==="intro"){ nextIntro(); return; } doneGuard=true;
  lidx++; if(lidx>=LESSONS.length) showFinal(); else loadLesson(lidx); }
function showFinal(){ els.main.style.display="none"; els.skip.style.display="none"; els.final.style.display="block";
  try{localStorage.setItem("momHub:done:organize","1");}catch(e){}
  els.bar.style.width="100%"; els.step.textContent=T(UI.finalStep); confetti(); setTimeout(confetti,500); setTimeout(confetti,1000); chime(); }
function restart(){ introIdx=0; lidx=0; els.skip.style.display="block"; els.final.style.display="none"; showIntro(); }

document.querySelectorAll("#langToggle button").forEach(b=>b.addEventListener("click",()=>setLang(b.dataset.l)));
applyStatic(); showIntro();
</script>
