<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>엄마의 단축키 배우기</title>
<style>
  :root{
    --bg1:#eef2ff; --bg2:#fdf2f8; --ink:#1f2937; --soft:#6b7280;
    --accent:#6366f1; --accent2:#ec4899; --good:#22c55e;
    --kbBg:#2b2f3a; --keyTop:#fbfcfe; --keyBot:#d7dbe3; --keyEdge:#a9afbd;
  }
  *{box-sizing:border-box; -webkit-user-select:none; user-select:none;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    color:var(--ink);background:linear-gradient(135deg,var(--bg1),var(--bg2));overflow:hidden;
    overscroll-behavior:none;touch-action:none;}
  #app{height:100%;display:flex;flex-direction:column;align-items:center;padding:12px;max-width:1000px;margin:0 auto;}
  header{width:100%;text-align:center;position:relative;}
  #langToggle{position:absolute;top:-2px;right:0;display:inline-flex;background:#fff;border:1px solid #e5e7eb;
    border-radius:999px;overflow:hidden;font-size:12px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.08);z-index:90;}
  #langToggle button{border:none;background:transparent;padding:6px 11px;cursor:pointer;color:#9ca3af;font-weight:700;}
  #langToggle button.on{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;}
  #homeBtn{position:absolute;top:-2px;left:0;display:inline-flex;align-items:center;text-decoration:none;
    background:#fff;border:1px solid #e5e7eb;border-radius:999px;font-size:12px;font-weight:700;color:#6366f1;
    padding:6px 11px;box-shadow:0 2px 6px rgba(0,0,0,.08);z-index:90;cursor:pointer;}
  #homeBtn:hover{background:#f5f5ff;}
  #homeBtn .en{display:none;}
  html[lang="en"] #homeBtn .ko{display:none;}
  html[lang="en"] #homeBtn .en{display:inline;}
  h1{font-size:22px;margin:2px 0;}
  .sub{color:var(--soft);font-size:14px;margin:0 0 8px;}
  #progressWrap{width:100%;height:12px;background:#fce7f3;border-radius:999px;overflow:hidden;margin-bottom:4px;}
  #progressBar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .45s ease;}
  #stepText{font-size:12px;color:var(--soft);margin-bottom:8px;}

  #card{position:relative;width:100%;flex:1;display:flex;flex-direction:column;min-height:0;gap:10px;}
  button.ghostBtn{position:absolute;right:2px;top:-4px;font-size:12px;color:var(--soft);background:#fff;
    border:1px solid #e5e7eb;border-radius:999px;padding:6px 12px;cursor:pointer;z-index:120;}

  /* intro */
  #introView{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#fff;border-radius:18px;box-shadow:0 10px 30px rgba(99,102,241,.12);padding:26px;text-align:center;overflow:auto;}
  #introArt{font-size:70px;line-height:1.15;margin-bottom:10px;}
  #introTitle{font-size:26px;font-weight:800;margin:4px 0;}
  #introText{font-size:17px;line-height:1.7;max-width:660px;color:#374151;}
  #introText b{color:var(--accent);}
  .keycap{display:inline-block;min-width:26px;padding:2px 8px;margin:0 2px;border-radius:8px;
    background:#f3f4f6;border:1px solid #d1d5db;border-bottom-width:3px;font-weight:800;color:#111827;}
  .introBtns{margin-top:20px;display:flex;gap:10px;}

  /* lesson main */
  #mainView{flex:1;min-height:0;display:flex;flex-direction:column;gap:10px;}
  #banner{background:#fff;border-radius:16px;box-shadow:0 8px 22px rgba(99,102,241,.12);padding:10px 16px;text-align:center;}
  #banner .t{font-size:18px;font-weight:800;}
  #banner .i{font-size:15px;margin-top:2px;}
  #banner .i b{color:var(--accent);}
  #banner .h{font-size:13px;color:var(--soft);margin-top:3px;}

  #stage{flex:1;min-height:0;display:flex;flex-direction:column;gap:8px;justify-content:center;align-items:center;}

  /* fake text document */
  #doc{width:min(560px,100%);background:#fff;border-radius:14px;box-shadow:0 10px 26px rgba(0,0,0,.12);
    border:1px solid #e5e7eb;overflow:hidden;}
  #docBar{height:30px;background:#eef0f4;border-bottom:1px solid #e2e5ea;display:flex;align-items:center;gap:6px;padding:0 10px;}
  #docBar .d{width:11px;height:11px;border-radius:50%;}
  .r{background:#ff5f57;} .y{background:#febc2e;} .g{background:#28c840;}
  #docBar .fn{font-size:12px;color:#6b7280;margin-left:6px;font-weight:600;}
  #docBody{min-height:70px;padding:14px 18px;font-size:22px;line-height:1.5;color:#111827;white-space:pre-wrap;word-break:break-word;}
  #docBody .selhi{background:#b3d4ff;border-radius:3px;}
  #docBody .caret{display:inline-block;width:2px;height:24px;background:#111827;vertical-align:-4px;animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0;}}
  #clip{font-size:12px;color:var(--soft);min-height:16px;text-align:center;}
  #clip b{color:#111827;}

  /* control-click target */
  #ctrlBox{width:min(560px,100%);height:88px;border:2px dashed #c7d2fe;border-radius:14px;background:#fff;
    display:flex;align-items:center;justify-content:center;font-size:15px;color:#4b5563;cursor:pointer;position:relative;text-align:center;padding:0 12px;}
  #ctxPop{position:absolute;background:#fff;border:1px solid #d1d5db;border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.2);
    padding:6px;font-size:14px;display:none;z-index:8;}
  #ctxPop div{padding:6px 14px;border-radius:7px;color:#374151;}

  /* keyboard */
  #kb{width:100%;background:var(--kbBg);border-radius:16px;padding:12px 12px 14px;
    box-shadow:0 16px 36px rgba(0,0,0,.28);display:flex;flex-direction:column;gap:8px;}
  .krow{display:flex;gap:8px;justify-content:center;}
  .key{position:relative;height:50px;min-width:40px;flex:1;max-width:64px;border-radius:10px;
    background:linear-gradient(180deg,var(--keyTop),var(--keyBot));border:1px solid var(--keyEdge);
    border-bottom:3px solid var(--keyEdge);display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-size:18px;font-weight:700;color:#1f2937;user-select:none;transition:transform .05s, box-shadow .15s;}
  .key .lab{font-size:9px;font-weight:600;color:#6b7280;margin-top:1px;letter-spacing:.2px;}
  .key.sym{font-size:20px;}
  .key.down{transform:translateY(2px);background:linear-gradient(180deg,#c7d2fe,#a5b4fc);
    border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.4);}
  .key.pulse{animation:kpulse 1.2s ease-in-out infinite;}
  @keyframes kpulse{0%,100%{box-shadow:0 0 0 0 rgba(236,72,153,0);}50%{box-shadow:0 0 0 5px rgba(236,72,153,.7);}}
  .key .light{position:absolute;top:5px;right:6px;width:6px;height:6px;border-radius:50%;background:#cbd5e1;}
  .key.lit .light{background:#22c55e;box-shadow:0 0 6px #22c55e;}

  #successOverlay{position:absolute;left:10px;right:10px;bottom:10px;top:auto;background:#f2fdf6;
    border:2px solid var(--good);box-shadow:0 10px 28px rgba(0,0,0,.16);display:none;
    flex-direction:row;align-items:center;gap:12px;border-radius:16px;z-index:60;padding:12px 14px;}
  #successOverlay .be{font-size:40px;animation:pop .5s ease;flex-shrink:0;}
  #successOverlay .msg{font-size:17px;font-weight:800;color:var(--good);flex:1;line-height:1.35;}
  #nextBtn{flex-shrink:0;font-size:16px;font-weight:800;color:#fff;cursor:pointer;border:none;
    background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;padding:11px 22px;
    box-shadow:0 4px 12px rgba(99,102,241,.35);animation:nbpulse 1.4s ease-in-out infinite;}
  #nextBtn:hover{filter:brightness(1.05);}
  @keyframes nbpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  @keyframes pop{0%{transform:scale(.3);opacity:0;}70%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
  .confetti{position:fixed;top:-20px;z-index:130;animation:fall linear forwards;pointer-events:none;}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.9;}}

  #finalScreen{display:none;text-align:center;background:#fff;border-radius:18px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,.12);}
  #finalScreen .tr{font-size:100px;animation:pop .6s ease;}
  button.big{margin-top:12px;font-size:17px;font-weight:700;color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent2));border:none;border-radius:999px;padding:11px 24px;cursor:pointer;}
  button.big.soft{background:#fff;color:var(--accent);border:2px solid var(--accent);}
  .toast{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;
    padding:8px 16px;border-radius:999px;font-size:14px;z-index:70;opacity:0;transition:opacity .25s;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div id="langToggle"><button data-l="ko">한국어</button><button data-l="en">EN</button></div>
    <a id="homeBtn" href="https://dthoma1.github.io/moms-arcade/"><span class="ko">🏠 교실</span><span class="en">🏠 Classroom</span></a>
    <h1 id="h1"></h1>
    <p class="sub" id="sub"></p>
    <div id="progressWrap"><div id="progressBar"></div></div>
    <div id="stepText"></div>
  </header>

  <div id="card">
    <button class="ghostBtn" id="skipBtn" onclick="skipStep()"></button>

    <div id="introView" style="display:none;">
      <div id="introArt">⌨️</div>
      <div id="introTitle"></div>
      <div id="introText"></div>
      <div class="introBtns">
        <button class="big soft" id="introBack" onclick="prevIntro()"></button>
        <button class="big" id="introNext" onclick="nextIntro()"></button>
      </div>
    </div>

    <div id="mainView" style="display:none;">
      <div id="banner">
        <div class="t" id="bTitle"></div>
        <div class="i" id="bInstr"></div>
        <div class="h" id="bHint"></div>
      </div>

      <div id="stage">
        <div id="doc">
          <div id="docBar"><span class="d r"></span><span class="d y"></span><span class="d g"></span><span class="fn" id="docName"></span></div>
          <div id="docBody"></div>
        </div>
        <div id="clip"></div>
        <div id="ctrlBox" style="display:none;">
          <span id="ctrlBoxText"></span>
          <div id="ctxPop"><div></div><div></div><div></div></div>
        </div>
      </div>

      <div id="kb"></div>
    </div>

    <div id="finalScreen">
      <div class="tr">🏆</div>
      <div style="font-size:26px;font-weight:800;" id="finalTitle"></div>
      <div style="font-size:17px;margin-top:6px;" id="finalMsg"></div>
      <button class="big" id="restartBtn" onclick="restart()"></button>
      <div style="margin-top:12px;"><a id="hubLink" href="https://dthoma1.github.io/moms-arcade/" style="display:inline-block;text-decoration:none;font-size:15px;font-weight:700;color:#6366f1;background:#eef2ff;border:1px solid #c7d2fe;border-radius:999px;padding:10px 18px;"></a></div>
    </div>

    <div id="successOverlay"><div class="be">🎉</div><div class="msg" id="successMsg"></div><button id="nextBtn" onclick="goNext()"></button></div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script>

/* ---------- language ---------- */
let LANG=localStorage.getItem("momLang")||"ko";
function T(o){ return (o&&typeof o==="object"&&("ko" in o))?(o[LANG]!=null?o[LANG]:o.ko):o; }
const UI={
  title:{ko:"엄마의 단축키 배우기",en:"Mom's Keyboard Shortcuts"},
  h1:{ko:"⌨️ 엄마의 단축키 배우기",en:"⌨️ Mom's Keyboard Shortcuts"},
  sub:{ko:"키보드의 ‘도우미 키’와 복사·붙여넣기 같은 빠른 방법을 하나씩 배워요.",en:"Learn helper keys and quick actions like copy and paste, one by one."},
  skip:{ko:"건너뛰기 ›",en:"Skip ›"}, back:{ko:"‹ 이전",en:"‹ Back"}, introNext:{ko:"다음 ▶",en:"Next ▶"}, start:{ko:"시작하기 ▶",en:"Start ▶"},
  next:{ko:"다음 ›",en:"Next ›"},
  restart:{ko:"다시 하기 🔁",en:"Play again 🔁"}, hub:{ko:"🏠 교실로 돌아가기",en:"🏠 Back to classroom"},
  finalTitle:{ko:"단축키 박사님!",en:"Shortcut expert!"},
  finalMsg:{ko:"이제 복사·붙여넣기도, 되돌리기도 척척! 정말 대단해요 💖",en:"Now copy, paste, and undo are all yours. Amazing work 💖"},
  step:{ko:(a,b)=>`${a} / ${b} 단계`,en:(a,b)=>`Step ${a} / ${b}`}, finalStep:{ko:"완료! 🎊",en:"Done! 🎊"},
  docName:{ko:"메모.txt",en:"Notes.txt"}, emptyDoc:{ko:"(빈 문서)",en:"(empty document)"}, clip:{ko:"📋 복사한 내용:",en:"📋 Copied text:"},
  ctrlBox:{ko:`여기 사각형을 <b style="margin:0 4px;color:#6366f1;">⌃ Control</b> 키를 누른 채 눌러 보세요`,en:`Hold <b style="margin:0 4px;color:#6366f1;">⌃ Control</b> and click this box`},
  ctx:{open:{ko:"열기",en:"Open"},rename:{ko:"이름 바꾸기",en:"Rename"},copy:{ko:"복사하기",en:"Copy"}},
  toasts:{copy:{ko:"복사했어요 📋",en:"Copied 📋"},paste:{ko:"붙여넣었어요 📌",en:"Pasted 📌"},cut:{ko:"잘라냈어요 ✂️",en:"Cut ✂️"},undo:{ko:"되돌렸어요 ↩️",en:"Undid ↩️"},selectAll:{ko:"전체 선택 ✅",en:"Selected all ✅"},save:{ko:"저장했어요 💾",en:"Saved 💾"},upper:{ko:c=>`대문자 ${c} ✅`,en:c=>`Capital ${c} ✅`},hidden:{ko:"숨은 글자 © 나왔어요",en:"Hidden character © appeared"},ctrlNeed:{ko:"⌃ Control 키도 함께 눌러야 해요",en:"Hold the ⌃ Control key too"},capsOn:{ko:"불이 켜졌어요 — 이제 다시 눌러 꺼요",en:"The light is on — press it again to turn it off"}},
  keyLabs:{caps:{ko:"캡스 록",en:"caps lock"},shift:{ko:"시프트",en:"shift"},control:{ko:"컨트롤",en:"control"},option:{ko:"옵션",en:"option"},command:{ko:"커맨드",en:"command"},space:{ko:"스페이스",en:"space"}}
};
function applyStatic(){
  document.documentElement.lang=LANG; document.title=T(UI.title);
  document.getElementById("h1").textContent=T(UI.h1); document.getElementById("sub").textContent=T(UI.sub);
  els.skip.textContent=T(UI.skip); els.introBack.textContent=T(UI.back); document.getElementById("restartBtn").textContent=T(UI.restart);
  document.getElementById("hubLink").textContent=T(UI.hub); document.getElementById("finalTitle").textContent=T(UI.finalTitle); document.getElementById("finalMsg").textContent=T(UI.finalMsg);
  document.getElementById("docName").textContent=T(UI.docName); document.getElementById("ctrlBoxText").innerHTML=T(UI.ctrlBox);
  document.getElementById("nextBtn").textContent=T(UI.next);
  const ctx=ctxPop.querySelectorAll("div"); ctx[0].textContent=T(UI.ctx.open); ctx[1].textContent=T(UI.ctx.rename); ctx[2].textContent=T(UI.ctx.copy);
  document.querySelectorAll("#langToggle button").forEach(b=>b.classList.toggle("on",b.dataset.l===LANG));
  buildKeyboard(); renderDoc();
}
function setLang(l){ LANG=l; localStorage.setItem("momLang",l); applyStatic();
  if(els.final.style.display==="block"){ els.step.textContent=T(UI.finalStep); }
  else if(phase==="intro"){ showIntro(); } else if(els.overlay.style.display!=="flex"){ loadLesson(lidx); }
}

/* ---------- praise + sound + confetti ---------- */
const PRAISE={ko:["잘했어요! 🎉","완벽해요! 👏","최고예요! ⭐","멋져요! 💖","정확해요! ✨","훌륭해요! 🌟"],
              en:["Well done! 🎉","Perfect! 👏","Great! ⭐","Lovely! 💖","Exactly! ✨","Excellent! 🌟"]};
const praise=()=>{const a=PRAISE[LANG]||PRAISE.ko;return a[Math.floor(Math.random()*a.length)];};
let actx=null;
function beep(f=660,d=.14){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();o.type="sine";o.frequency.value=f;
  g.gain.setValueAtTime(.0001,actx.currentTime);g.gain.exponentialRampToValueAtTime(.25,actx.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);
  o.start();o.stop(actx.currentTime+d);}catch(e){}}
const chime=()=>{beep(660,.12);setTimeout(()=>beep(880,.16),110);};
const clickSnd=()=>beep(520,.05);
function confetti(){const E=["🎉","✨","💖","⭐","🌸","🎊","💛"];for(let i=0;i<26;i++){const c=document.createElement("div");
  c.className="confetti";c.textContent=E[Math.floor(Math.random()*E.length)];c.style.left=Math.random()*100+"vw";
  c.style.animationDuration=(1.6+Math.random()*1.4)+"s";c.style.fontSize=(18+Math.random()*20)+"px";
  document.body.appendChild(c);setTimeout(()=>c.remove(),3200);} }

let toastT=null;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1300); }

/* ---------- keyboard build ---------- */
const KB=document.getElementById("kb");
const LETTER_ROWS=[
  ["Q","W","E","R","T","Y","U","I","O","P"],
  ["A","S","D","F","G","H","J","K","L"],
  ["Z","X","C","V","B","N","M"],
];
const MOD_ROW=[
  {sym:"⇪",lab:UI.keyLabs.caps,code:"caps",flex:1.5,light:true},
  {sym:"⇧",lab:UI.keyLabs.shift,code:"shift",flex:1.8},
  {sym:"⌃",lab:UI.keyLabs.control,code:"control",flex:1.2},
  {sym:"⌥",lab:UI.keyLabs.option,code:"option",flex:1.2},
  {sym:"⌘",lab:UI.keyLabs.command,code:"command",flex:1.4},
  {sym:"",lab:UI.keyLabs.space,code:"space",flex:4},
  {sym:"⌘",lab:UI.keyLabs.command,code:"command",flex:1.4},
  {sym:"⌥",lab:UI.keyLabs.option,code:"option",flex:1.2},
];
function buildKeyboard(){
  KB.innerHTML="";
  LETTER_ROWS.forEach(row=>{
    const r=document.createElement("div"); r.className="krow";
    row.forEach(ch=>{ const k=document.createElement("div"); k.className="key"; k.dataset.code=ch; k.textContent=ch; r.appendChild(k); });
    KB.appendChild(r);
  });
  const mr=document.createElement("div"); mr.className="krow";
  MOD_ROW.forEach(m=>{
    const k=document.createElement("div"); k.className="key sym"; k.dataset.code=m.code; k.style.flex=m.flex;
    k.innerHTML=(m.light?'<span class="light"></span>':'')+(m.sym?`<span>${m.sym}</span>`:'')+`<span class="lab">${T(m.lab)}</span>`;
    mr.appendChild(k);
  });
  KB.appendChild(mr);
}
buildKeyboard();
const keysByCode=code=>[...KB.querySelectorAll(`[data-code="${code}"]`)];
function setDown(code,on){ keysByCode(code).forEach(k=>k.classList.toggle("down",on)); }
function clearDown(){ KB.querySelectorAll(".down").forEach(k=>k.classList.remove("down")); }
function clearPulses(){ KB.querySelectorAll(".pulse").forEach(k=>k.classList.remove("pulse")); }
function setCapsLight(on){ keysByCode("caps").forEach(k=>k.classList.toggle("lit",on)); }

/* ---------- fake document model ---------- */
const docBody=document.getElementById("docBody");
const clipView=document.getElementById("clip");
const DOC_INITIAL={ko:"안녕하세요 엄마",en:"Hello Mom"};
let doc={text:T(DOC_INITIAL), sel:false, caret:false};
let clip="";
let hist=[];
function snapshot(){ return {text:doc.text, sel:doc.sel, caret:doc.caret}; }
function pushHist(){ hist.push(snapshot()); if(hist.length>40) hist.shift(); }
function escapeHtml(s){ return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function renderDoc(){
  let inner="";
  if(doc.sel && doc.text) inner=`<span class="selhi">${escapeHtml(doc.text)}</span>`;
  else inner=escapeHtml(doc.text);
  if(doc.caret) inner+='<span class="caret"></span>';
  docBody.innerHTML=inner || `<span style="color:#9ca3af;">${T(UI.emptyDoc)}</span>`;
  clipView.innerHTML = clip ? `${T(UI.clip)} <b>${escapeHtml(clip)}</b>` : "";
}

/* apply the standard editing shortcuts to the fake document (visual feedback) */
function applyShortcut(info){
  if(info.meta){
    const c=info.code;
    if(c==="C"){ if(doc.text){ clip=doc.text; toast(T(UI.toasts.copy)); } }
    else if(c==="V"){ if(clip){ pushHist(); if(doc.sel){ doc.text=clip; doc.sel=false; } else { doc.text=doc.text+clip; } doc.caret=false; toast(T(UI.toasts.paste)); } }
    else if(c==="X"){ if(doc.text){ pushHist(); clip=doc.text; doc.text=""; doc.sel=false; doc.caret=true; toast(T(UI.toasts.cut)); } }
    else if(c==="Z"){ if(hist.length){ const s=hist.pop(); doc.text=s.text; doc.sel=s.sel; doc.caret=s.caret; toast(T(UI.toasts.undo)); } }
    else if(c==="A"){ if(doc.text){ doc.sel=true; doc.caret=false; toast(T(UI.toasts.selectAll)); } }
    else if(c==="S"){ toast(T(UI.toasts.save)); }
    renderDoc();
  } else if(info.shift && info.code && info.code.length===1 && /[A-Z]/.test(info.code)){
    pushHist(); doc.text=(doc.sel?"":doc.text)+info.code; doc.sel=false; doc.caret=true; toast(UI.toasts.upper[LANG](info.code)); renderDoc();
  } else if(info.alt && info.code==="G"){
    pushHist(); doc.text=(doc.sel?"":doc.text)+"©"; doc.sel=false; doc.caret=true; toast(T(UI.toasts.hidden)); renderDoc();
  }
}

/* ---------- physical key handling ---------- */
let listener=null;
function notifyGame(type,payload){ if(listener) listener(type,payload); }
let capsOn=false;

function codeToLetter(code){ if(code&&code.indexOf("Key")===0) return code.slice(3); if(code&&code.indexOf("Digit")===0) return code.slice(5); return ""; }
function eventInfo(e){
  return { shift:e.shiftKey, meta:e.metaKey, alt:e.altKey, ctrl:e.ctrlKey, caps:capsOn,
           code:codeToLetter(e.code), raw:e.code };
}
function highlight(e){
  clearDown();
  if(e.shiftKey) setDown("shift",true);
  if(e.metaKey) setDown("command",true);
  if(e.altKey) setDown("option",true);
  if(e.ctrlKey) setDown("control",true);
  const L=codeToLetter(e.code); if(L) setDown(L,true);
  if(e.code==="Space") setDown("space",true);
}

const COMBO_LETTERS=["C","V","X","Z","A","S"];
document.addEventListener("keydown",e=>{
  if(e.repeat) return;
  if(e.code==="CapsLock"){ capsOn=true; setCapsLight(true); notifyGame("caps",{on:true}); return; }
  if(e.metaKey && COMBO_LETTERS.includes(codeToLetter(e.code))) e.preventDefault();
  if(e.altKey) e.preventDefault();
  highlight(e);
  const info=eventInfo(e);
  applyShortcut(info);
  notifyGame("key",info);
},{capture:false});

document.addEventListener("keyup",e=>{
  if(e.code==="CapsLock"){ capsOn=false; setCapsLight(false); notifyGame("caps",{on:false}); return; }
  highlight(e);
  if(!e.shiftKey&&!e.metaKey&&!e.altKey&&!e.ctrlKey) clearDown();
});

/* control-click target: on macOS, ⌃+click fires the contextmenu (secondary click) */
const ctrlBox=document.getElementById("ctrlBox");
const ctxPop=document.getElementById("ctxPop");
function popContext(x,y){ ctxPop.style.left=x+"px"; ctxPop.style.top=y+"px"; ctxPop.style.display="block";
  clickSnd(); notifyGame("ctrlclick",{ctrl:true}); setTimeout(()=>ctxPop.style.display="none",1600); }
ctrlBox.addEventListener("contextmenu",e=>{ e.preventDefault(); popContext(e.offsetX,e.offsetY); });
ctrlBox.addEventListener("click",e=>{ if(e.target.closest("#ctxPop")) return;
  if(e.ctrlKey){ popContext(e.offsetX,e.offsetY); } else { toast(T(UI.toasts.ctrlNeed)); } });
document.addEventListener("gesturestart",e=>e.preventDefault());

/* ---------- engine ---------- */
let lidx=0;
const els={ bar:document.getElementById("progressBar"), step:document.getElementById("stepText"),
  intro:document.getElementById("introView"), introArt:document.getElementById("introArt"),
  introTitle:document.getElementById("introTitle"), introText:document.getElementById("introText"),
  introBack:document.getElementById("introBack"),
  main:document.getElementById("mainView"), final:document.getElementById("finalScreen"),
  overlay:document.getElementById("successOverlay"), msg:document.getElementById("successMsg"), skip:document.getElementById("skipBtn"),
  bTitle:document.getElementById("bTitle"), bInstr:document.getElementById("bInstr"), bHint:document.getElementById("bHint") };
const totalSteps=INTRO.length+LESSONS.length;
function doneCount(){ return phase==="intro"?introIdx:INTRO.length+lidx; }
function updateProgress(){ els.step.textContent=UI.step[LANG](doneCount()+1,totalSteps); els.bar.style.width=(doneCount()/totalSteps*100)+"%"; }

function showIntro(){ phase="intro"; els.intro.style.display="flex"; els.main.style.display="none"; els.final.style.display="none";
  const c=INTRO[introIdx]; els.introArt.textContent=c.art; els.introTitle.textContent=T(c.title); els.introText.innerHTML=T(c.html);
  els.introBack.style.visibility=introIdx===0?"hidden":"visible";
  document.getElementById("introNext").textContent=introIdx===INTRO.length-1?T(UI.start):T(UI.introNext); updateProgress(); }
function nextIntro(){ if(introIdx<INTRO.length-1){ introIdx++; showIntro(); } else startLessons(); }
function prevIntro(){ if(introIdx>0){ introIdx--; showIntro(); } }
function startLessons(){ phase="lessons"; lidx=0; els.intro.style.display="none"; els.main.style.display="flex"; loadLesson(0); }

function resetDoc(){ doc={text:T(DOC_INITIAL), sel:false, caret:false}; clip=""; hist=[]; renderDoc(); }

function loadLesson(i){
  const lv=LESSONS[i];
  els.bTitle.textContent=T(lv.title); els.bInstr.innerHTML=T(lv.instr); els.bHint.textContent="💡 "+T(lv.hint);
  updateProgress(); listener=null; clearPulses(); clearDown();
  ctrlBox.style.display = lv.showCtrlBox ? "flex" : "none";
  ctxPop.style.display="none";
  (lv.pulse||[]).forEach(tok=>keysByCode(tok).forEach(k=>k.classList.add("pulse")));
  lv.setup(onDone);
}
function onDone(emoji,msg){
  listener=null; clearPulses(); clearDown();
  els.bar.style.width=((INTRO.length+lidx+1)/totalSteps*100)+"%";
  els.msg.textContent=msg?T(msg):praise(); els.overlay.querySelector(".be").textContent=emoji||"🎉";
  els.overlay.style.display="flex"; confetti(); chime();
}
function goNext(){ els.overlay.style.display="none"; lidx++; if(lidx>=LESSONS.length) showFinal(); else loadLesson(lidx); }
function skipStep(){ if(phase==="intro"){ nextIntro(); return; } listener=null; clearPulses(); clearDown();
  lidx++; if(lidx>=LESSONS.length) showFinal(); else loadLesson(lidx); }
function showFinal(){ els.main.style.display="none"; els.skip.style.display="none"; els.final.style.display="block";
  try{localStorage.setItem("momHub:done:keyboard","1");}catch(e){}
  els.bar.style.width="100%"; els.step.textContent=T(UI.finalStep); confetti(); setTimeout(confetti,500); setTimeout(confetti,1000); chime(); }
function restart(){ introIdx=0; lidx=0; els.skip.style.display="block"; els.final.style.display="none"; capsOn=false; setCapsLight(false); resetDoc(); showIntro(); }

document.querySelectorAll("#langToggle button").forEach(b=>b.addEventListener("click",()=>setLang(b.dataset.l)));
resetDoc();
applyStatic();
showIntro();
</script>
