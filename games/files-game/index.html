<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>엄마의 파일과 폴더 배우기</title>
<style>
  :root{
    --bg1:#eef2ff; --bg2:#fdf2f8; --ink:#1f2937; --soft:#6b7280;
    --accent:#6366f1; --accent2:#ec4899; --good:#22c55e;
    --win:#ffffff; --sidebar:#f3f4f6; --toolbar:#e9eaee; --sel:#dbeafe; --selBorder:#3b82f6;
  }
  *{box-sizing:border-box; -webkit-user-select:none; user-select:none;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    color:var(--ink);background:linear-gradient(135deg,var(--bg1),var(--bg2));overflow:hidden;
    overscroll-behavior:none;touch-action:none;}
  #app{height:100%;display:flex;flex-direction:column;align-items:center;padding:12px;max-width:1000px;margin:0 auto;}
  header{width:100%;text-align:center;position:relative;}
  #langToggle{position:absolute;top:-2px;right:0;display:inline-flex;background:#fff;border:1px solid #e5e7eb;border-radius:999px;overflow:hidden;font-size:12px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.08);z-index:90;}
  #langToggle button{border:none;background:transparent;padding:6px 11px;cursor:pointer;color:#9ca3af;font-weight:700;}
  #langToggle button.on{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;}
  #homeBtn{position:absolute;top:-2px;left:0;display:inline-flex;align-items:center;text-decoration:none;
    background:#fff;border:1px solid #e5e7eb;border-radius:999px;font-size:12px;font-weight:700;color:#6366f1;
    padding:6px 11px;box-shadow:0 2px 6px rgba(0,0,0,.08);z-index:90;cursor:pointer;}
  #homeBtn:hover{background:#f5f5ff;}
  #homeBtn .en{display:none;}
  html[lang="en"] #homeBtn .ko{display:none;}
  html[lang="en"] #homeBtn .en{display:inline;}
  h1{font-size:22px;margin:2px 0;}
  .sub{color:var(--soft);font-size:14px;margin:0 0 8px;}
  #progressWrap{width:100%;height:12px;background:#fce7f3;border-radius:999px;overflow:hidden;margin-bottom:4px;}
  #progressBar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .45s ease;}
  #stepText{font-size:12px;color:var(--soft);margin-bottom:8px;}

  #card{position:relative;width:100%;flex:1;display:flex;flex-direction:column;min-height:0;gap:10px;}
  button.ghostBtn{position:absolute;right:2px;top:-4px;font-size:12px;color:var(--soft);background:#fff;
    border:1px solid #e5e7eb;border-radius:999px;padding:6px 12px;cursor:pointer;z-index:80;}

  /* intro / story cards */
  #introView{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#fff;border-radius:18px;box-shadow:0 10px 30px rgba(99,102,241,.12);padding:26px;text-align:center;}
  #introArt{font-size:78px;line-height:1.15;margin-bottom:10px;}
  #introTitle{font-size:26px;font-weight:800;margin:4px 0;}
  #introText{font-size:17px;line-height:1.7;max-width:640px;color:#374151;}
  #introText b{color:var(--accent);}
  .introBtns{margin-top:20px;display:flex;gap:10px;}

  /* lesson banner */
  #mainView{flex:1;min-height:0;display:flex;flex-direction:column;gap:10px;}
  #banner{background:#fff;border-radius:16px;box-shadow:0 8px 22px rgba(99,102,241,.12);padding:10px 16px;text-align:center;}
  #banner .t{font-size:18px;font-weight:800;}
  #banner .i{font-size:15px;margin-top:2px;}
  #banner .h{font-size:13px;color:var(--soft);margin-top:3px;}

  /* Finder window */
  #finder{flex:1;min-height:0;background:var(--win);border-radius:14px;overflow:hidden;
    box-shadow:0 18px 40px rgba(0,0,0,.18);display:flex;flex-direction:column;border:1px solid #d1d5db;}
  #toolbar{height:46px;background:var(--toolbar);display:flex;align-items:center;gap:8px;padding:0 12px;
    border-bottom:1px solid #d8dade;}
  .dots{display:flex;gap:7px;margin-right:4px;}
  .dot{width:12px;height:12px;border-radius:50%;}
  .dot.r{background:#ff5f57;} .dot.y{background:#febc2e;} .dot.g{background:#28c840;}
  .navBtn{width:30px;height:26px;border-radius:7px;border:1px solid #cfd2d8;background:#fff;font-size:15px;
    cursor:pointer;color:#374151;display:flex;align-items:center;justify-content:center;}
  .navBtn:disabled{opacity:.4;cursor:default;}
  #crumb{font-weight:700;font-size:15px;display:flex;align-items:center;gap:4px;flex-wrap:nowrap;overflow:hidden;}
  #crumb .cpart{cursor:pointer;padding:2px 4px;border-radius:5px;}
  #crumb .cpart:hover{background:#dfe2e8;}
  #toolbar .spacer{flex:1;}
  .tbBtn{border:1px solid #cfd2d8;background:#fff;border-radius:8px;padding:6px 10px;font-size:13px;
    cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .tbBtn:disabled{opacity:.4;cursor:default;}
  #searchBox{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid #cfd2d8;border-radius:8px;padding:4px 8px;}
  #searchBox input{border:none;outline:none;font-size:13px;width:110px;background:transparent;}

  #body{flex:1;min-height:0;display:flex;}
  #sidebar{width:180px;background:var(--sidebar);border-right:1px solid #e2e4e9;padding:10px 8px;overflow-y:auto;}
  .sbLabel{font-size:11px;color:#9ca3af;font-weight:700;padding:6px 8px 3px;}
  .sbItem{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:7px;font-size:14px;cursor:pointer;color:#374151;}
  .sbItem:hover{background:#e5e7eb;}
  .sbItem.active{background:#d5d9e6;font-weight:700;}

  #content{flex:1;min-height:0;overflow-y:auto;padding:16px;display:grid;
    grid-template-columns:repeat(auto-fill,92px);grid-auto-rows:106px;gap:10px;align-content:start;position:relative;}
  .item{width:92px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;
    border-radius:10px;cursor:pointer;}
  .item .ic{font-size:44px;line-height:1;pointer-events:none;position:relative;}
  .item .nm{font-size:12px;text-align:center;word-break:break-word;max-width:88px;padding:1px 4px;border-radius:4px;}
  .item.selected{background:var(--sel);}
  .item.selected .nm{background:var(--selBorder);color:#fff;}
  .item.dropok{outline:3px solid var(--good);outline-offset:2px;border-radius:12px;}
  .item.hilite{animation:hl 1.3s ease-in-out infinite;}
  @keyframes hl{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0);}50%{box-shadow:0 0 0 4px rgba(99,102,241,.35);}}
  .item .nm input{font-size:12px;width:80px;text-align:center;border:1px solid var(--selBorder);border-radius:3px;}
  #emptyHint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#c3c6cf;font-size:14px;pointer-events:none;text-align:center;padding:20px;}

  /* Dock with trash */
  #dock{display:flex;justify-content:center;}
  #dockInner{background:rgba(255,255,255,.6);backdrop-filter:blur(8px);border:1px solid #e5e7eb;
    border-radius:16px;padding:8px 16px;display:flex;gap:14px;align-items:flex-end;}
  #trash{font-size:44px;cursor:pointer;transition:transform .12s;}
  #trash.dropok{transform:scale(1.25);}
  .dockLabel{font-size:11px;color:var(--soft);text-align:center;}

  #ghost{position:fixed;pointer-events:none;font-size:44px;z-index:90;opacity:.9;transform:translate(-50%,-50%);display:none;}

  #successOverlay{position:absolute;left:10px;right:10px;bottom:10px;top:auto;background:#f2fdf6;
    border:2px solid var(--good);box-shadow:0 10px 28px rgba(0,0,0,.16);display:none;
    flex-direction:row;align-items:center;gap:12px;border-radius:16px;z-index:60;padding:12px 14px;}
  #successOverlay .be{font-size:40px;animation:pop .5s ease;flex-shrink:0;}
  #successOverlay .msg{font-size:17px;font-weight:800;color:var(--good);flex:1;line-height:1.35;}
  #nextBtn{flex-shrink:0;font-size:16px;font-weight:800;color:#fff;cursor:pointer;border:none;
    background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;padding:11px 22px;
    box-shadow:0 4px 12px rgba(99,102,241,.35);animation:nbpulse 1.4s ease-in-out infinite;}
  #nextBtn:hover{filter:brightness(1.05);}
  @keyframes nbpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  @keyframes pop{0%{transform:scale(.3);opacity:0;}70%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
  .confetti{position:fixed;top:-20px;z-index:95;animation:fall linear forwards;pointer-events:none;}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.9;}}
  #finalScreen{display:none;text-align:center;background:#fff;border-radius:18px;padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);}
  #finalScreen .tr{font-size:100px;animation:pop .6s ease;}
  button.big{margin-top:12px;font-size:17px;font-weight:700;color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent2));border:none;border-radius:999px;
    padding:11px 24px;cursor:pointer;}
  button.big.soft{background:#fff;color:var(--accent);border:2px solid var(--accent);}
</style>
  <link rel="stylesheet" href="../_shared/twocol.css" />
</head>
<body>
<div id="app">
  <header>
    <div id="langToggle"><button data-l="ko">한국어</button><button data-l="en">EN</button></div>
    <a id="homeBtn" href="https://dthoma1.github.io/mom-games/"><span class="ko">🏠 교실</span><span class="en">🏠 Classroom</span></a>
    <h1 id="h1"></h1>
    <p class="sub" id="sub"></p>
    <div id="progressWrap"><div id="progressBar"></div></div>
    <div id="stepText"></div>
  </header>

  <div id="card">
    <button class="ghostBtn" id="skipBtn" onclick="skipStep()"></button>

    <!-- intro / story -->
    <div id="introView" style="display:none;">
      <div id="introArt">🗄️</div>
      <div id="introTitle"></div>
      <div id="introText"></div>
      <div class="introBtns">
        <button class="big soft" id="introBack" onclick="prevIntro()"></button>
        <button class="big" id="introNext" onclick="nextIntro()"></button>
      </div>
    </div>

    <!-- interactive finder -->
    <div id="mainView" style="display:none;">
      <div id="banner">
        <div class="t" id="bTitle"></div>
        <div class="i" id="bInstr"></div>
        <div class="h" id="bHint"></div>
      </div>
      <div id="finder">
        <div id="toolbar">
          <div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
          <button class="navBtn" id="backBtn">◁</button>
          <button class="navBtn" id="fwdBtn">▷</button>
          <div id="crumb"></div>
          <div class="spacer"></div>
          <div id="tbButtons"></div>
          <div id="searchBox">🔍<input id="searchInput" /></div>
        </div>
        <div id="body">
          <div id="sidebar"></div>
          <div id="content"></div>
        </div>
      </div>
      <div id="dock"><div id="dockInner">
        <div style="text-align:center;"><div id="trash">🗑️</div><div class="dockLabel" id="trashLabel"></div></div>
      </div></div>
    </div>

    <div id="finalScreen">
      <div class="tr">🏆</div>
      <div style="font-size:26px;font-weight:800;" id="finalTitle"></div>
      <div style="font-size:17px;margin-top:6px;" id="finalMsg"></div>
      <button class="big" id="restartBtn" onclick="restart()"></button>
      <div style="margin-top:12px;"><a id="hubLink" href="https://dthoma1.github.io/mom-games/" style="display:inline-block;text-decoration:none;font-size:15px;font-weight:700;color:#6366f1;background:#eef2ff;border:1px solid #c7d2fe;border-radius:999px;padding:10px 18px;"></a></div>
    </div>

    <div id="successOverlay"><div class="be">🎉</div><div class="msg" id="successMsg"></div><button id="nextBtn" onclick="goNext()"></button></div>
  </div>
</div>
<div id="ghost"></div>

<script>
/* ---------- language ---------- */
let LANG=localStorage.getItem("momLang")||"ko";
function T(o){ return (o&&typeof o==="object"&&("ko" in o))?(o[LANG]!=null?o[LANG]:o.ko):o; }
const UI={
  pageTitle:{ko:"엄마의 파일과 폴더 배우기",en:"Learning Files and Folders"}, h1:{ko:"🗂️ 엄마의 파일과 폴더 배우기",en:"🗂️ Learning Files and Folders"},
  sub:{ko:"컴퓨터가 물건을 어떻게 보관하는지, 하나씩 천천히 배워요.",en:"Learn slowly, one step at a time, how the computer stores your things."},
  skip:{ko:"건너뛰기 ›",en:"Skip ›"}, introBack:{ko:"‹ 이전",en:"‹ Back"}, introNext:{ko:"다음 ▶",en:"Next ▶"}, introStart:{ko:"시작하기 ▶",en:"Start ▶"},
  back:{ko:"뒤로",en:"Back"}, forward:{ko:"앞으로",en:"Forward"}, search:{ko:"검색",en:"Search"}, trash:{ko:"휴지통",en:"Trash"}, favorites:{ko:"즐겨찾기",en:"Favorites"},
  restore:{ko:"↩️ 되돌려 놓기",en:"↩️ Restore"}, emptyTrash:{ko:"🗑️ 휴지통 비우기",en:"🗑️ Empty Trash"}, newFolder:{ko:"🆕 새로운 폴더",en:"🆕 New Folder"}, duplicate:{ko:"📑 복제",en:"📑 Duplicate"},
  emptyTrashMsg:{ko:"휴지통이 비어 있어요",en:"Trash is empty"}, noSearch:{ko:"검색 결과가 없어요",en:"No search results"}, emptyFolder:{ko:"이 폴더는 비어 있어요",en:"This folder is empty"},
  fileOpened:{ko:n=>`${n} 파일을 열었어요`,en:n=>`Opened the file ${n}`}, copySuffix:{ko:" 복사본",en:" Copy"},
  finalTitle:{ko:"파일·폴더 박사님!",en:"Files and folders expert!"}, finalMsg:{ko:"이제 컴퓨터 속 물건을 스스로 정리할 수 있어요. 정말 자랑스러워요 💖",en:"Now you can organize the things on your computer by yourself. I am so proud of you 💖"}, restart:{ko:"다시 하기 🔁",en:"Play again 🔁"}, hub:{ko:"🏠 교실로 돌아가기",en:"🏠 Back to classroom"},
  next:{ko:"다음 ›",en:"Next ›"},
  step:{ko:(a,b)=>`${a} / ${b} 단계`,en:(a,b)=>`Step ${a} / ${b}`}, finalStep:{ko:"완료! 🎊",en:"Done! 🎊"},
  names:{"데스크탑":{ko:"데스크탑",en:"Desktop"},"사진":{ko:"사진",en:"Photos"},"제주도 여행":{ko:"제주도 여행",en:"Jeju Trip"},"바다.jpg":{ko:"바다.jpg",en:"Beach.jpg"},"한라산.jpg":{ko:"한라산.jpg",en:"Hallasan.jpg"},"강아지.jpg":{ko:"강아지.jpg",en:"Dog.jpg"},"가족사진.jpg":{ko:"가족사진.jpg",en:"Family Photo.jpg"},"서류":{ko:"서류",en:"Papers"},"이력서.txt":{ko:"이력서.txt",en:"Resume.txt"},"좋아하는노래.mp3":{ko:"좋아하는노래.mp3",en:"Favorite Song.mp3"},"메모.txt":{ko:"메모.txt",en:"Memo.txt"},"다운로드":{ko:"다운로드",en:"Downloads"},"사용설명서.pdf":{ko:"사용설명서.pdf",en:"User Manual.pdf"},"지도.png":{ko:"지도.png",en:"Map.png"},"광고전단.png":{ko:"광고전단.png",en:"Ad Flyer.png"},"문서":{ko:"문서",en:"Documents"},"가계부":{ko:"가계부",en:"Budget"},"일기.txt":{ko:"일기.txt",en:"Diary.txt"},"휴지통":{ko:"휴지통",en:"Trash"},"제목 없는 폴더":{ko:"제목 없는 폴더",en:"Untitled Folder"}}
};
function N(name){ return T(UI.names[name]||name); }
function applyStatic(){ document.documentElement.lang=LANG; document.title=T(UI.pageTitle); document.getElementById("h1").textContent=T(UI.h1); document.getElementById("sub").textContent=T(UI.sub); document.getElementById("skipBtn").textContent=T(UI.skip); document.getElementById("introBack").textContent=T(UI.introBack); document.getElementById("nextBtn").textContent=T(UI.next); document.getElementById("backBtn").title=T(UI.back); document.getElementById("fwdBtn").title=T(UI.forward); document.getElementById("searchInput").placeholder=T(UI.search); document.getElementById("trashLabel").textContent=T(UI.trash); document.getElementById("finalTitle").textContent=T(UI.finalTitle); document.getElementById("finalMsg").textContent=T(UI.finalMsg); document.getElementById("restartBtn").textContent=T(UI.restart); document.getElementById("hubLink").textContent=T(UI.hub); document.querySelectorAll("#langToggle button").forEach(b=>b.classList.toggle("on",b.dataset.l===LANG)); }
function setLang(l){ LANG=l; localStorage.setItem("momLang",l); applyStatic(); if(typeof els!=="undefined"&&els.final.style.display==="block"){ els.step.textContent=T(UI.finalStep); } else if(typeof phase!=="undefined"){ if(phase==="intro") showIntro(); else if(!doneGuard) loadLesson(lidx); } }
document.querySelectorAll("#langToggle button").forEach(b=>b.addEventListener("click",()=>setLang(b.dataset.l)));

/* ---------- praise + sound + confetti ---------- */
const PRAISE={ko:["잘했어요! 🎉","완벽해요! 👏","최고예요! ⭐","멋져요! 💖","정확해요! ✨","훌륭해요! 🌟"],en:["Well done! 🎉","Perfect! 👏","Great! ⭐","Lovely! 💖","Exactly! ✨","Wonderful! 🌟"]};
const praise=()=>{const a=PRAISE[LANG]||PRAISE.ko;return a[Math.floor(Math.random()*a.length)];};
let actx=null;
function beep(f=660,d=.14){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();o.type="sine";o.frequency.value=f;
  g.gain.setValueAtTime(.0001,actx.currentTime);g.gain.exponentialRampToValueAtTime(.25,actx.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);
  o.start();o.stop(actx.currentTime+d);}catch(e){}}
const chime=()=>{beep(660,.12);setTimeout(()=>beep(880,.16),110);};
function confetti(){const E=["🎉","✨","💖","⭐","🌸","🎊","💛"];for(let i=0;i<26;i++){const c=document.createElement("div");
  c.className="confetti";c.textContent=E[Math.floor(Math.random()*E.length)];c.style.left=Math.random()*100+"vw";
  c.style.animationDuration=(1.6+Math.random()*1.4)+"s";c.style.fontSize=(18+Math.random()*20)+"px";
  document.body.appendChild(c);setTimeout(()=>c.remove(),3200);} }

/* ---------- simulated file system ---------- */
let uid=1; const nid=()=>"n"+(uid++);
function folder(name,children){return{id:nid(),type:"folder",name,ic:"📁",children:children||[]};}
function file(name,ic){return{id:nid(),type:"file",name,ic};}

let FS, TRASH, state;
function resetWorld(){
  FS={
    "데스크탑":[
      folder("사진",[
        folder("제주도 여행",[file("바다.jpg","🏖️"),file("한라산.jpg","⛰️")]),
        file("강아지.jpg","🐶"), file("가족사진.jpg","🖼️"),
      ]),
      folder("서류",[file("이력서.txt","📄")]),
      file("좋아하는노래.mp3","🎵"),
      file("메모.txt","📝"),
    ],
    "다운로드":[ file("사용설명서.pdf","📕"), file("지도.png","🗺️"), file("광고전단.png","📢") ],
    "문서":[ folder("가계부",[]), file("일기.txt","📓") ],
  };
  TRASH=[];
  state={root:"데스크탑", path:[], history:[], future:[], selected:null, query:""};
}
const SIDEBAR=[
  {name:"데스크탑",ic:"🖥️"},
  {name:"다운로드",ic:"📥"},
  {name:"문서",ic:"📄"},
  {name:"휴지통",ic:"🗑️", trash:true},
];

function currentChildren(){
  if(state.root==="휴지통") return TRASH;
  let arr=FS[state.root];
  for(const id of state.path){ const f=arr.find(n=>n.id===id); if(!f) break; arr=f.children; }
  return arr;
}
function crumbParts(){
  if(state.root==="휴지통") return [N("휴지통")];
  let parts=[N(state.root)]; let arr=FS[state.root];
  for(const id of state.path){ const f=arr.find(n=>n.id===id); if(!f)break; parts.push(N(f.name)); arr=f.children; }
  return parts;
}

/* ---------- rendering ---------- */
const content=document.getElementById("content");
const sidebar=document.getElementById("sidebar");
const crumb=document.getElementById("crumb");
const backBtn=document.getElementById("backBtn");
const fwdBtn=document.getElementById("fwdBtn");
const tbButtons=document.getElementById("tbButtons");
const searchInput=document.getElementById("searchInput");

function renderSidebar(){
  sidebar.innerHTML=`<div class="sbLabel">${T(UI.favorites)}</div>`;
  SIDEBAR.forEach(s=>{
    const el=document.createElement("div");
    el.className="sbItem"+(state.root===s.name&&state.path.length===0?" active":"");
    el.innerHTML=`<span>${s.ic}</span><span>${N(s.name)}</span>`;
    el.dataset.name=s.name;
    el.onclick=()=>{ pushHistory(); state.root=s.name; state.path=[]; state.selected=null; state.query=""; searchInput.value=""; render(); notify("sidebar",{name:s.name}); };
    sidebar.appendChild(el);
  });
}
function renderCrumb(){
  const parts=crumbParts();
  crumb.innerHTML="";
  parts.forEach((p,i)=>{
    if(i>0){ const sep=document.createElement("span"); sep.textContent="›"; sep.style.color="#9ca3af"; crumb.appendChild(sep); }
    const el=document.createElement("span"); el.className="cpart"; el.textContent=p;
    el.onclick=()=>{ // click a breadcrumb to jump up
      if(state.root==="휴지통") return;
      pushHistory(); state.path=state.path.slice(0,i); state.selected=null; render(); notify("crumb",{index:i});
    };
    crumb.appendChild(el);
  });
  backBtn.disabled = state.history.length===0;
  fwdBtn.disabled = state.future.length===0;
}
function renderToolbar(){
  tbButtons.innerHTML="";
  if(state.root==="휴지통"){
    const put=btn(T(UI.restore), ()=>restoreSelected());
    const empty=btn(T(UI.emptyTrash), ()=>emptyTrash());
    put.disabled=!state.selected;
    tbButtons.append(put, empty);
  } else {
    const nf=btn(T(UI.newFolder), ()=>newFolder());
    const dup=btn(T(UI.duplicate), ()=>duplicateSelected());
    dup.disabled=!(state.selected && currentChildren().some(n=>n.id===state.selected && n.type==="file"));
    tbButtons.append(nf, dup);
  }
}
function btn(label, fn){ const b=document.createElement("button"); b.className="tbBtn"; b.textContent=label; b.onclick=fn; return b; }

let highlightNames=[]; // names to visually pulse for the current lesson
function renderContent(){
  content.innerHTML="";
  let items=currentChildren();
  if(state.query){ const q=state.query.toLowerCase(); items=items.filter(n=>n.name.toLowerCase().includes(q)); }
  if(items.length===0){
    content.innerHTML=`<div id="emptyHint">${state.root==="휴지통"?T(UI.emptyTrashMsg):(state.query?T(UI.noSearch):T(UI.emptyFolder))}</div>`;
    return;
  }
  items.forEach(node=>{
    const el=document.createElement("div");
    el.className="item"+(state.selected===node.id?" selected":"")+(highlightNames.includes(node.name)?" hilite":"");
    el.dataset.id=node.id;
    el.innerHTML=`<div class="ic">${node.ic}</div><div class="nm">${N(node.name)}</div>`;
    el.addEventListener("click",()=>selectNode(node));
    el.addEventListener("dblclick",()=>openNode(node));
    el.addEventListener("pointerdown",e=>startDrag(e,node,el));
    content.appendChild(el);
  });
}
function render(){ renderSidebar(); renderCrumb(); renderToolbar(); renderContent(); }

/* ---------- actions ---------- */
function pushHistory(){ state.history.push({root:state.root,path:[...state.path]}); state.future=[]; }
function selectNode(node){ state.selected=node.id; updateSelectionUI(); notify("select",{node}); }
function updateSelectionUI(){
  [...content.children].forEach(c=>{ if(c.dataset&&c.dataset.id) c.classList.toggle("selected", c.dataset.id===state.selected); });
  renderToolbar();
}
function openNode(node){
  if(node.type==="folder"){
    pushHistory(); state.path=[...state.path,node.id]; state.selected=null; state.query=""; searchInput.value=""; render(); notify("open",{node});
  } else { beep(720,.1); flash(T(UI.fileOpened)(N(node.name))); notify("openfile",{node}); }
}
function goBack(){ if(!state.history.length)return; state.future.push({root:state.root,path:[...state.path]});
  const p=state.history.pop(); state.root=p.root; state.path=p.path; state.selected=null; state.query=""; searchInput.value=""; render(); notify("back",{}); }
function goForward(){ if(!state.future.length)return; state.history.push({root:state.root,path:[...state.path]});
  const n=state.future.pop(); state.root=n.root; state.path=n.path; state.selected=null; render(); notify("forward",{}); }
backBtn.onclick=goBack; fwdBtn.onclick=goForward;

function newFolder(){
  const arr=currentChildren(); const f=folder("제목 없는 폴더",[]);
  arr.push(f); state.selected=f.id; render(); notify("newfolder",{node:f}); startRename(f);
}
function duplicateSelected(){
  const arr=currentChildren(); const node=arr.find(n=>n.id===state.selected);
  if(!node||node.type!=="file") return;
  const copy=file(node.name.replace(/(\.[^.]+)?$/, (m)=>T(UI.copySuffix)+(m||"")), node.ic);
  arr.push(copy); state.selected=copy.id; render(); beep(700,.1); notify("duplicate",{node:copy});
}
function restoreSelected(){
  const i=TRASH.findIndex(n=>n.id===state.selected); if(i<0) return;
  const node=TRASH.splice(i,1)[0];
  // put back onto desktop for simplicity
  FS["데스크탑"].push(node); state.selected=null; render(); beep(760,.12); notify("restore",{node});
}
function emptyTrash(){ if(TRASH.length===0){ notify("empty",{}); return;} TRASH.length=0; state.selected=null; render(); beep(400,.16); notify("empty",{}); }

function startRename(node){
  const el=[...content.children].find(c=>c.dataset&&c.dataset.id===node.id); if(!el) return;
  const nm=el.querySelector(".nm"); nm.innerHTML=`<input value="${N(node.name)}" />`;
  const inp=nm.querySelector("input"); inp.focus(); inp.select();
  const commit=()=>{ const v=(inp.value||"").trim(); const old=node.name; if(v){node.name=v;} render(); if(v&&v!==old) notify("rename",{node,oldName:old,newName:v}); };
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();commit();} });
  inp.addEventListener("blur",commit);
}
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"){ const a=document.activeElement; if(a&&a.tagName==="INPUT")return;
    if(state.selected){ const node=currentChildren().find(n=>n.id===state.selected); if(node){ e.preventDefault(); startRename(node);} } }
});

searchInput.addEventListener("input",()=>{ state.query=searchInput.value; renderContent(); notify("search",{query:state.query}); });

function flash(msg){
  const f=document.createElement("div"); f.textContent="👁️ "+msg;
  f.style.cssText="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:8px 16px;border-radius:999px;font-size:13px;z-index:45;opacity:0;transition:opacity .2s;";
  document.getElementById("finder").appendChild(f); requestAnimationFrame(()=>f.style.opacity="1");
  setTimeout(()=>{f.style.opacity="0";setTimeout(()=>f.remove(),250);},1200);
}

/* ---------- drag & drop (pointer events; move into folder / trash) ---------- */
const ghost=document.getElementById("ghost");
const trash=document.getElementById("trash");
let drag=null;
function startDrag(e,node,el){
  if(e.button!==undefined && e.button!==0) return;
  drag={node,el,startX:e.clientX,startY:e.clientY,active:false};
  window.addEventListener("pointermove",onDragMove);
  window.addEventListener("pointerup",onDragEnd);
  window.addEventListener("pointercancel",onDragEnd);
}
function onDragMove(e){
  if(!drag) return;
  if(!drag.active){ if(Math.hypot(e.clientX-drag.startX,e.clientY-drag.startY)<6) return;
    drag.active=true; ghost.textContent=drag.node.ic; ghost.style.display="block"; drag.el.style.opacity=".35"; }
  ghost.style.left=e.clientX+"px"; ghost.style.top=e.clientY+"px";
  clearDropHighlight();
  const t=dropTargetAt(e.clientX,e.clientY);
  if(t==="trash") trash.classList.add("dropok"); else if(t&&t.el) t.el.classList.add("dropok");
}
function clearDropHighlight(){ trash.classList.remove("dropok"); [...content.children].forEach(c=>c.classList&&c.classList.remove("dropok")); }
function dropTargetAt(x,y){
  const tr=trash.getBoundingClientRect();
  if(x>=tr.left&&x<=tr.right&&y>=tr.top&&y<=tr.bottom) return "trash";
  const under=document.elementFromPoint(x,y); const itemEl=under&&under.closest?under.closest(".item"):null;
  if(itemEl && itemEl!==drag.el){ const node=currentChildren().find(n=>n.id===itemEl.dataset.id);
    if(node&&node.type==="folder") return {el:itemEl,node}; }
  return null;
}
function onDragEnd(e){
  window.removeEventListener("pointermove",onDragMove); window.removeEventListener("pointerup",onDragEnd); window.removeEventListener("pointercancel",onDragEnd);
  if(!drag) return;
  const wasActive=drag.active; ghost.style.display="none";
  const t=wasActive?dropTargetAt(e.clientX,e.clientY):null;
  const node=drag.node; clearDropHighlight(); if(drag.el) drag.el.style.opacity="";
  drag=null; if(!wasActive) return;
  if(t==="trash"){ const arr=currentChildren(); const i=arr.findIndex(n=>n.id===node.id); if(i>=0)arr.splice(i,1);
    TRASH.push(node); state.selected=null; render(); beep(420,.14); notify("trash",{node}); }
  else if(t&&t.node){ const arr=currentChildren(); const i=arr.findIndex(n=>n.id===node.id); if(i>=0)arr.splice(i,1);
    t.node.children.push(node); state.selected=null; render(); beep(700,.12); notify("move",{node,into:t.node}); }
  else render();
}

  { title:{ko:"휴지통은 안전망이에요",en:"Trash is a safety net"}, instr:{ko:"왼쪽 사이드바의 ‘휴지통’을 열고, 방금 버린 파일을 클릭해 ‘↩️ 되돌려 놓기’로 살려보세요.",en:"Open Trash in the left sidebar, click the file you just threw away, and use ↩️ Restore to bring it back."}, hint:{ko:"실수로 버려도 걱정 마세요! 휴지통에서 파일을 골라 되돌리면 다시 살아나요. 정말 지우려면 ‘휴지통 비우기’를 눌러요.",en:"Do not worry if you throw something away by mistake. Choose it in Trash and restore it. To delete for real, use Empty Trash."}, setup(done){ if(TRASH.length===0){ TRASH.push(file("광고전단.png","📢")); } listener=(t,p)=>{ if(t==="restore") done("♻️",{ko:"버린 파일을 되살렸어요!",en:"You restored the file from Trash!"}); }; } },
];

/* helpers to place the user for a lesson */
function goTo(root){ state.root=root; state.path=[]; state.selected=null; state.query=""; searchInput.value=""; state.history=[]; state.future=[]; }
function ensureInsideFolder(name){ // enter a top-level folder of current desktop by name
  const f=FS["데스크탑"].find(n=>n.name===name&&n.type==="folder");
  if(f){ state.root="데스크탑"; state.path=[f.id]; state.selected=null; }
}
function ensureDeep(){ const s=FS["데스크탑"].find(n=>n.name==="사진");
  const j=s&&s.children.find(n=>n.name==="제주도 여행");
  if(s&&j){ state.root="데스크탑"; state.path=[s.id,j.id]; state.selected=null; } }

/* ---------- engine ---------- */
let lidx=0,doneGuard=false;
const els={
  bar:document.getElementById("progressBar"), step:document.getElementById("stepText"),
  intro:document.getElementById("introView"), introArt:document.getElementById("introArt"),
  introTitle:document.getElementById("introTitle"), introText:document.getElementById("introText"),
  introBack:document.getElementById("introBack"),
  main:document.getElementById("mainView"), final:document.getElementById("finalScreen"),
  overlay:document.getElementById("successOverlay"), msg:document.getElementById("successMsg"),
  skip:document.getElementById("skipBtn"),
  bTitle:document.getElementById("bTitle"), bInstr:document.getElementById("bInstr"), bHint:document.getElementById("bHint"),
};
const totalSteps=INTRO.length+LESSONS.length;
function doneCount(){ return phase==="intro" ? introIdx : INTRO.length+lidx; }
function updateProgress(){ els.step.textContent=T(UI.step)(doneCount()+1,totalSteps); els.bar.style.width=(doneCount()/totalSteps*100)+"%"; }

function showIntro(){
  phase="intro"; els.intro.style.display="flex"; els.main.style.display="none"; els.final.style.display="none";
  const c=INTRO[introIdx]; els.introArt.textContent=c.art; els.introTitle.textContent=T(c.title); els.introText.innerHTML=T(c.html);
  els.introBack.style.visibility = introIdx===0 ? "hidden":"visible";
  document.getElementById("introNext").textContent = introIdx===INTRO.length-1 ? T(UI.introStart) : T(UI.introNext);
  updateProgress();
}
function nextIntro(){ if(introIdx<INTRO.length-1){ introIdx++; showIntro(); } else { startLessons(); } }
function prevIntro(){ if(introIdx>0){ introIdx--; showIntro(); } }
function startLessons(){ phase="lessons"; lidx=0; doneGuard=false; els.intro.style.display="none"; els.main.style.display="flex"; loadLesson(0); }

function loadLesson(i){
  const lv=LESSONS[i];
  els.bTitle.textContent=T(lv.title);
  els.bInstr.innerHTML=T(lv.instr);
  els.bHint.textContent="💡 "+T(lv.hint);
  updateProgress();
  listener=null; highlightNames=lv.highlight||[];
  lv.setup(onDone);
  render();
}
function onDone(emoji,msg){
  if(doneGuard) return; doneGuard=true;
  listener=null; highlightNames=[];
  els.bar.style.width=((INTRO.length+lidx+1)/totalSteps*100)+"%";
  els.msg.textContent=msg?T(msg):praise(); els.overlay.querySelector(".be").textContent=emoji||"🎉";
  els.overlay.style.display="flex"; confetti(); chime();
}
function goNext(){ els.overlay.style.display="none"; doneGuard=false; lidx++;
  if(lidx>=LESSONS.length) showFinal(); else loadLesson(lidx); }
function skipStep(){
  if(doneGuard) return;
  if(phase==="intro"){ nextIntro(); return; }
  listener=null; highlightNames=[]; lidx++;
  if(lidx>=LESSONS.length) showFinal(); else loadLesson(lidx);
}
function showFinal(){ els.main.style.display="none"; els.skip.style.display="none"; els.final.style.display="block";
  try{localStorage.setItem("momHub:done:files","1");}catch(e){}
  els.bar.style.width="100%"; els.step.textContent=T(UI.finalStep); confetti(); setTimeout(confetti,500); setTimeout(confetti,1000); chime(); }
function restart(){ resetWorld(); introIdx=0; lidx=0; doneGuard=false; els.skip.style.display="block"; els.final.style.display="none"; render(); showIntro(); }

document.addEventListener("gesturestart",e=>e.preventDefault());
document.addEventListener("wheel",e=>{ if(e.ctrlKey) e.preventDefault(); },{passive:false});

applyStatic(); resetWorld(); render(); showIntro();
</script>
<script src="../_shared/twocol.js"></script>
